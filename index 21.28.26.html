/* ===== css/theme-2026.css ===== */
/* ============================================================
   BALLOONGESTOR PRO — TEMA PREMIUM 2026
   Override sobre main.css/components.css (não toca em JS/regras).
   Inspiração: Linear, Stripe Dashboard, Notion, Framer, ClickUp.
   ============================================================ */

/* Inter via Google Fonts (carrega quando online; cai em system-ui offline) */


:root {
  /* Tipografia */
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI Variable', 'Segoe UI', system-ui, Roboto, 'Helvetica Neue', Arial, sans-serif;
  --font-display: var(--font-sans);
  --font-mono: 'JetBrains Mono', 'SF Mono', ui-monospace, Menlo, Consolas, monospace;

  /* Paleta neutra premium (Linear/Stripe) */
  --bg-app:        #F8F9FB;
  --bg-surface:    #FFFFFF;
  --bg-elevated:   #FFFFFF;
  --bg-subtle:     #F1F3F7;
  --bg-muted:      #EEF0F4;

  --border-subtle: rgba(15, 23, 42, 0.06);
  --border-base:   rgba(15, 23, 42, 0.09);
  --border-strong: rgba(15, 23, 42, 0.14);

  --text-primary:   #0B1220;
  --text-secondary: #475569;
  --text-muted:     #64748B;
  --text-faint:     #94A3B8;

  /* Acento — gradient lilás → rosa (marca) */
  --brand-1: #7C5CFF;
  --brand-2: #B65CFF;
  --brand-3: #EC4899;
  --brand-gradient: linear-gradient(135deg, #7C5CFF 0%, #B65CFF 45%, #EC4899 100%);
  --brand-gradient-soft: linear-gradient(135deg, rgba(124,92,255,.12), rgba(236,72,153,.12));

  --success: #10B981; --success-soft: rgba(16,185,129,.12);
  --warning: #F59E0B; --warning-soft: rgba(245,158,11,.14);
  --danger:  #EF4444; --danger-soft:  rgba(239,68,68,.12);
  --info:    #3B82F6; --info-soft:    rgba(59,130,246,.12);

  /* Radius */
  --radius-xs: 6px;
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 18px;
  --radius-xl: 22px;
  --radius-2xl: 28px;
  --radius: 14px;

  /* Sombras suaves em camadas */
  --shadow-xs: 0 1px 2px rgba(15, 23, 42, .04);
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, .05), 0 1px 3px rgba(15, 23, 42, .03);
  --shadow-md: 0 4px 12px -2px rgba(15, 23, 42, .06), 0 2px 4px -1px rgba(15, 23, 42, .04);
  --shadow-lg: 0 16px 32px -12px rgba(15, 23, 42, .12), 0 6px 14px -6px rgba(15, 23, 42, .06);
  --shadow-xl: 0 32px 64px -16px rgba(15, 23, 42, .18), 0 12px 24px -8px rgba(15, 23, 42, .08);
  --shadow-brand: 0 10px 30px -10px rgba(124, 92, 255, .45);
  --shadow-glow:  0 0 0 4px rgba(124, 92, 255, .12);

  /* Motion */
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --transition: 180ms var(--ease);
  --transition-slow: 280ms var(--ease-out);

  /* Layout */
  --nav-width: 256px;
  --nav-width-collapsed: 72px;
  --header-height: 68px;

  /* Sidebar (claro/premium, estilo Notion) */
  --nav-bg: #0B1220;
  --nav-bg-2: #111A2E;
  --nav-hover: rgba(255, 255, 255, 0.06);
  --nav-active: rgba(124, 92, 255, 0.18);
  --nav-active-border: rgba(124, 92, 255, 0.6);
  --nav-text: #94A3B8;
  --nav-text-active: #FFFFFF;
  --nav-divider: rgba(255, 255, 255, 0.06);
}

[data-theme="dark"] {
  --bg-app:      #0A0F1C;
  --bg-surface:  #0F172A;
  --bg-elevated: #131D33;
  --bg-subtle:   #131C30;
  --bg-muted:    #1A2540;

  --border-subtle: rgba(255, 255, 255, 0.05);
  --border-base:   rgba(255, 255, 255, 0.08);
  --border-strong: rgba(255, 255, 255, 0.14);

  --text-primary:   #F1F5F9;
  --text-secondary: #CBD5E1;
  --text-muted:     #94A3B8;
  --text-faint:     #64748B;

  --shadow-sm: 0 1px 2px rgba(0,0,0,.45);
  --shadow-md: 0 4px 14px -2px rgba(0,0,0,.5), 0 2px 4px -1px rgba(0,0,0,.35);
  --shadow-lg: 0 18px 36px -12px rgba(0,0,0,.6), 0 8px 16px -8px rgba(0,0,0,.4);
  --shadow-xl: 0 32px 64px -16px rgba(0,0,0,.65), 0 12px 24px -8px rgba(0,0,0,.45);
}

/* ============================================================
   BASE
   ============================================================ */
html { font-size: 15px; }
*, *::before, *::after { box-sizing: border-box; }
body {
  font-family: var(--font-sans);
  background: var(--bg-app);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: 'cv02','cv03','cv04','cv11','ss01';
  letter-spacing: -0.005em;
  line-height: 1.55;
}
h1, h2, h3, h4, h5, h6,
.section-title, .brand-name, .modal-header h3, .kpi-value, .stat-value {
  font-family: var(--font-display);
  letter-spacing: -0.022em;
  color: var(--text-primary);
  font-weight: 700;
  text-wrap: balance;
}
.section-title { font-size: 28px; font-weight: 700; }
.section-subtitle { color: var(--text-muted); font-size: 14px; margin-top: 4px; }

::selection { background: rgba(124,92,255,.22); }

/* Scrollbar refinada */
* { scrollbar-width: thin; scrollbar-color: rgba(15,23,42,.18) transparent; }
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-thumb { background: rgba(15,23,42,.16); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
*::-webkit-scrollbar-thumb:hover { background: rgba(15,23,42,.28); background-clip: padding-box; border: 2px solid transparent; }

/* ============================================================
   APP / LAYOUT
   ============================================================ */
#app { background: var(--bg-app); min-height: 100vh; }
.main-content { background: var(--bg-app); }

/* ============================================================
   SIDEBAR — premium dark com colapsável
   ============================================================ */
.sidebar {
  width: var(--nav-width);
  background: linear-gradient(180deg, var(--nav-bg) 0%, var(--nav-bg-2) 100%);
  color: var(--nav-text);
  border-right: 1px solid var(--nav-divider);
  display: flex; flex-direction: column;
  padding: 18px 14px;
  /* Mantém modelo original do main.css: fixed + main-content margin-left */
  position: fixed; top: 0; left: 0; height: 100vh;
  z-index: 100; overflow-y: auto;
  transition: width var(--transition), transform var(--transition);
}
.sidebar.collapsed { width: var(--nav-width-collapsed); padding: 18px 8px; }
.main-content {
  flex: 1;
  margin-left: var(--nav-width);
  transition: margin-left var(--transition);
}
.sidebar.collapsed ~ .main-content,
body:has(.sidebar.collapsed) .main-content { margin-left: var(--nav-width-collapsed); }
.sidebar.collapsed .nav-label,
.sidebar.collapsed .nav-section-label,
.sidebar.collapsed .brand-name,
.sidebar.collapsed .brand-tagline,
.sidebar.collapsed .brand-credit,
.sidebar.collapsed .btn-sidebar-backup span,
.sidebar.collapsed #balao-logout-side span,
.sidebar.collapsed #balao-logout-side { display: none; }

/* Brand */
.sidebar-brand {
  display: grid;
  grid-template-columns: 40px 1fr;
  grid-template-rows: auto auto;
  column-gap: 12px; row-gap: 2px;
  align-items: center;
  padding: 6px 10px 18px;
  border-bottom: 1px solid var(--nav-divider);
  margin-bottom: 14px;
}
.brand-logo {
  grid-row: 1 / span 2;
  width: 40px; height: 40px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  background: var(--brand-gradient);
  box-shadow: var(--shadow-brand);
  font-size: 22px; color: #fff;
}
.brand-logo svg { width: 22px; height: 22px; display: block; }
.brand-name {
  color: #fff;
  font-size: 15px; font-weight: 700;
  letter-spacing: -0.01em;
  white-space: nowrap;
}
.brand-tagline {
  color: #94A3B8;
  font-size: 11px; font-weight: 500;
  letter-spacing: .01em;
  line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sidebar.collapsed .sidebar-brand {
  grid-template-columns: 1fr;
  justify-items: center;
  padding: 6px 0 14px;
}

/* Nav sections */
.nav-section { margin-bottom: 16px; }
.nav-section-label {
  font-size: 10.5px; font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: #64748B;
  padding: 8px 12px 6px;
}

.nav-link {
  display: flex; align-items: center; gap: 12px;
  width: 100%;
  padding: 9px 12px;
  border: none; background: transparent;
  color: var(--nav-text);
  font: inherit; font-size: 13.5px; font-weight: 500;
  border-radius: 10px;
  cursor: pointer;
  position: relative;
  transition: background var(--transition), color var(--transition), transform var(--transition);
  text-align: left;
}
.nav-link:hover { background: var(--nav-hover); color: #E2E8F0; }
.nav-link.active {
  background: var(--nav-active);
  color: var(--nav-text-active);
}
.nav-link.active::before {
  content:''; position:absolute; left:-4px; top:8px; bottom:8px;
  width:3px; border-radius:3px;
  background: var(--brand-gradient);
}
.nav-icon { width: 20px; flex: 0 0 20px; text-align: center; font-size: 16px; opacity: .9; }
.nav-link.active .nav-icon { opacity: 1; }

.sidebar.collapsed .nav-link { justify-content: center; padding: 10px 0; }

/* Sidebar footer */
.sidebar-footer {
  margin-top: auto;
  padding-top: 14px;
  border-top: 1px solid var(--nav-divider);
  display: flex;
  flex-direction: column;
  gap: 22px;
}
.btn-sidebar-backup,
#balao-logout-side {
  width: 100%; padding: 11px 12px;
  background: rgba(255,255,255,.04);
  color: #E2E8F0;
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 10px;
  font: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: background var(--transition), border-color var(--transition), transform var(--transition);
}
.btn-sidebar-backup:hover,
#balao-logout-side:hover { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.16); }

/* ============================================================
   HEADER — glass com backdrop blur
   ============================================================ */
.top-header {
  position: sticky; top: 0; z-index: 50;
  height: var(--header-height);
  display: flex; align-items: center; gap: 16px;
  padding: 0 28px;
  background: rgba(248, 249, 251, 0.72);
  backdrop-filter: saturate(180%) blur(16px);
  -webkit-backdrop-filter: saturate(180%) blur(16px);
  border-bottom: 1px solid var(--border-subtle);
}
[data-theme="dark"] .top-header { background: rgba(10,15,28,.72); }

#sidebar-toggle, #menu-toggle, #theme-toggle, #balao-logout-top {
  width: 38px; height: 38px;
  display: inline-flex; align-items: center; justify-content: center;
  border: 1px solid var(--border-base);
  background: var(--bg-surface);
  color: var(--text-secondary);
  border-radius: 10px;
  cursor: pointer;
  font-size: 15px;
  transition: background var(--transition), color var(--transition), border-color var(--transition), transform var(--transition);
}
#sidebar-toggle:hover, #menu-toggle:hover, #theme-toggle:hover, #balao-logout-top:hover {
  background: var(--bg-subtle); color: var(--text-primary); border-color: var(--border-strong);
}
#menu-toggle { display: none; }

.header-search {
  flex: 1; max-width: 520px; position: relative;
}
.header-search input#global-search {
  width: 100%;
  height: 40px;
  padding: 0 14px 0 40px;
  border-radius: 12px;
  border: 1px solid var(--border-base);
  background: var(--bg-surface);
  color: var(--text-primary);
  font: inherit; font-size: 13.5px;
  transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
}
.header-search::before {
  content:''; position:absolute; left:14px; top:50%; width:16px; height:16px;
  transform: translateY(-50%);
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2364748B' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'/><path d='m21 21-4.3-4.3'/></svg>");
  background-size: contain; background-repeat: no-repeat;
  pointer-events: none;
}
.header-search input#global-search:focus {
  outline: none;
  border-color: rgba(124,92,255,.5);
  box-shadow: var(--shadow-glow);
}
.header-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }

/* ============================================================
   SECTIONS
   ============================================================ */
.section {
  padding: 22px 24px 48px;
  max-width: 100%; margin: 0;
  animation: vxFadeIn .3s var(--ease-out);
}
@keyframes vxFadeIn { from { opacity: 0; transform: translateY(6px) } to { opacity: 1; transform: none } }

.section-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 16px; margin-bottom: 24px;
}
.section-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* ============================================================
   BOTÕES — refinados
   ============================================================ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  height: 40px; padding: 0 16px;
  border-radius: 10px;
  border: 1px solid transparent;
  font: inherit; font-size: 13.5px; font-weight: 600;
  cursor: pointer;
  transition: background var(--transition), color var(--transition), border-color var(--transition), transform var(--transition), box-shadow var(--transition);
  letter-spacing: -0.005em;
  white-space: nowrap;
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-sm { height: 32px; padding: 0 12px; font-size: 12.5px; border-radius: 8px; }
.btn-lg { height: 46px; padding: 0 20px; font-size: 14.5px; border-radius: 12px; }

.btn-primary {
  background: var(--brand-gradient);
  color: #fff;
  box-shadow: var(--shadow-brand);
}
.btn-primary:hover { box-shadow: 0 14px 36px -10px rgba(124,92,255,.55); filter: brightness(1.05); }

.btn-secondary {
  background: var(--bg-surface);
  color: var(--text-primary);
  border-color: var(--border-base);
  box-shadow: var(--shadow-xs);
}
.btn-secondary:hover { background: var(--bg-subtle); border-color: var(--border-strong); }

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
}
.btn-ghost:hover { background: var(--bg-subtle); color: var(--text-primary); }

.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #DC2626; }

.btn-success { background: var(--success); color: #fff; }

/* ============================================================
   CARDS / SURFACES
   ============================================================ */
.card, .panel, .stat-card, .kpi-card, .module-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  padding: 16px;
  transition: box-shadow var(--transition), border-color var(--transition), transform var(--transition);
}
.card:hover, .panel:hover, .stat-card:hover, .kpi-card:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--border-base);
}

/* ============================================================
   KPIs — cartões compactos com tendência
   ============================================================ */
.kpi-grid, .stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 22px;
}
.kpi-card, .stat-card {
  position: relative; overflow: hidden;
  padding: 14px 16px;
}
.kpi-card::before, .stat-card::before {
  content:''; position:absolute; inset: 0;
  background: var(--brand-gradient-soft);
  opacity: 0; transition: opacity var(--transition);
  pointer-events: none;
}
.kpi-card:hover::before, .stat-card:hover::before { opacity: .6; }
.kpi-label, .stat-label {
  font-size: 11px; font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .06em;
  display: flex; align-items: center; gap: 6px;
}
.kpi-value, .stat-value {
  font-size: 22px; font-weight: 700;
  margin-top: 6px;
  letter-spacing: -0.025em;
  font-variant-numeric: tabular-nums;
  color: var(--text-primary);
}
.kpi-delta, .stat-trend {
  display: inline-flex; align-items: center; gap: 4px;
  margin-top: 8px;
  padding: 3px 8px;
  font-size: 11.5px; font-weight: 600;
  border-radius: 999px;
  background: var(--success-soft); color: var(--success);
}
.kpi-delta.down, .stat-trend.down { background: var(--danger-soft); color: var(--danger); }

/* ============================================================
   FORMS / INPUTS
   ============================================================ */
input[type="text"], input[type="email"], input[type="password"],
input[type="number"], input[type="date"], input[type="time"],
input[type="tel"], input[type="url"], input[type="search"],
select, textarea {
  width: 100%;
  min-height: 42px;
  padding: 10px 14px;
  background: var(--bg-surface);
  border: 1px solid var(--border-base);
  border-radius: 10px;
  color: var(--text-primary);
  font: inherit; font-size: 14px;
  transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
}
textarea { min-height: 90px; resize: vertical; line-height: 1.55; }
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: rgba(124,92,255,.55);
  box-shadow: var(--shadow-glow);
}
label {
  display: block;
  font-size: 12.5px; font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.form-group, .field { margin-bottom: 16px; }

/* ============================================================
   TABELAS — limpas
   ============================================================ */
table {
  width: 100%;
  border-collapse: separate; border-spacing: 0;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  font-size: 13.5px;
}
thead th {
  text-align: left;
  padding: 12px 16px;
  background: var(--bg-subtle);
  color: var(--text-muted);
  font-size: 11.5px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .06em;
  border-bottom: 1px solid var(--border-subtle);
}
tbody td {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border-subtle);
  color: var(--text-primary);
  vertical-align: middle;
}
tbody tr { transition: background var(--transition); }
tbody tr:hover { background: var(--bg-subtle); }
tbody tr:last-child td { border-bottom: none; }

/* ============================================================
   BADGES / TAGS / CHIPS
   ============================================================ */
.badge, .tag, .status, .chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11.5px; font-weight: 600;
  background: var(--bg-muted);
  color: var(--text-secondary);
  border: 1px solid var(--border-subtle);
  letter-spacing: -0.005em;
}
.badge-success, .status-success, .status-paid { background: var(--success-soft); color: var(--success); border-color: transparent; }
.badge-warning, .status-warning, .status-pending { background: var(--warning-soft); color: var(--warning); border-color: transparent; }
.badge-danger,  .status-danger,  .status-overdue { background: var(--danger-soft);  color: var(--danger);  border-color: transparent; }
.badge-info,    .status-info,    .status-active  { background: var(--info-soft);    color: var(--info);    border-color: transparent; }

/* ============================================================
   MODAIS
   ============================================================ */
.modal-overlay {
  background: rgba(15, 23, 42, .48) !important;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  animation: vxFadeIn .2s var(--ease-out);
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow: hidden;
}
.modal, .modal-content, .modal-dialog {
  background: #FFFFFF !important;
  color: var(--text-primary);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-xl);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  width: min(100%, 600px);
  max-height: 90vh;
  min-height: 0;
  animation: vxModalIn .25s var(--ease-out);
}
.modal-lg { width: min(100%, 800px); }
.modal-xl { width: min(100%, 1000px); }
@keyframes vxModalIn { from { opacity: 0; transform: translateY(10px) scale(.98) } to { opacity: 1; transform: none } }
.modal-header {
  padding: 20px 24px 14px;
  border-bottom: 1px solid var(--border-subtle);
  display: flex; align-items: center; justify-content: space-between;
  background: #FFFFFF;
  flex: 0 0 auto;
  position: relative;
  z-index: 2;
}
.modal-header h3 { font-size: 17px; margin: 0; color: var(--text-primary); }
.modal-body {
  padding: 20px 24px;
  background: #FFFFFF;
  flex: 1 1 auto;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  overscroll-behavior: contain;
  scrollbar-width: thin;
  scrollbar-color: rgba(236,72,153,.32) transparent;
}
.modal-body::-webkit-scrollbar { width: 10px; }
.modal-body::-webkit-scrollbar-track { background: transparent; }
.modal-body::-webkit-scrollbar-thumb {
  background: rgba(236,72,153,.28);
  border-radius: 999px;
  border: 3px solid #FFFFFF;
  background-clip: padding-box;
}
.modal-body::-webkit-scrollbar-thumb:hover { background: rgba(236,72,153,.44); background-clip: padding-box; }
.modal-footer {
  padding: 14px 24px 18px;
  display: flex; gap: 10px; justify-content: flex-end;
  border-top: 1px solid var(--border-subtle);
  background: #FAFBFC;
  flex: 0 0 auto;
  position: relative;
  z-index: 2;
}
body.modal-open { overflow: hidden !important; }
/* Inputs dentro dos modais — fundo branco, borda suave, texto escuro */
.modal input, .modal select, .modal textarea,
.modal .form-input, .modal .form-select {
  background: #FFFFFF !important;
  color: #0B1220 !important;
  border: 1px solid #E2E8F0 !important;
  transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
}
.modal input:focus, .modal select:focus, .modal textarea:focus,
.modal .form-input:focus, .modal .form-select:focus {
  outline: none;
  border-color: var(--brand-1) !important;
  box-shadow: var(--shadow-glow);
}
.modal label, .modal .form-group label { color: #334155 !important; }
.modal-close {
  width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center;
  background: transparent; border: none; border-radius: 8px;
  font-size: 22px; color: var(--text-muted); cursor: pointer;
  transition: background var(--transition);
}
.modal-close:hover { background: var(--bg-subtle); color: var(--text-primary); }

@media (max-width: 700px) {
  .modal-overlay { padding: 0; align-items: stretch; }
  .modal, .modal-lg, .modal-xl, .modal-content, .modal-dialog {
    width: 100%;
    max-width: none;
    max-height: 100dvh;
    min-height: 100dvh;
    border-radius: 0;
  }
  .modal-header, .modal-body, .modal-footer { padding-left: 18px; padding-right: 18px; }
  .modal-footer { flex-wrap: wrap; }
  .modal-footer .btn { flex: 1 1 140px; justify-content: center; }
}

/* ============================================================
   GRÁFICOS (Chart.js wrapper)
   ============================================================ */
canvas { max-width: 100% !important; }
.chart-card, .chart-container {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 24px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow var(--transition);
}
.chart-card:hover { box-shadow: var(--shadow-md); }
.chart-title {
  font-size: 15px; font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}
.chart-subtitle {
  font-size: 12.5px; color: var(--text-muted); margin-bottom: 18px;
}

/* ============================================================
   CALENDÁRIO — visual Google Calendar moderno
   ============================================================ */
.calendar, .calendar-grid {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.calendar-header, .calendar-toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-surface);
}
.calendar-weekdays {
  display: grid; grid-template-columns: repeat(7,1fr);
  background: var(--bg-subtle);
  color: var(--text-muted);
  font-size: 11.5px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .06em;
}
.calendar-weekdays > * { padding: 10px 12px; text-align: left; }
.calendar-days { display: grid; grid-template-columns: repeat(7,1fr); }
.calendar-day, .cal-day {
  min-height: 110px;
  padding: 8px 10px;
  border-right: 1px solid var(--border-subtle);
  border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-surface);
  transition: background var(--transition);
  cursor: pointer;
}
.calendar-day:hover, .cal-day:hover { background: var(--bg-subtle); }
.calendar-day.other-month, .cal-day.muted { color: var(--text-faint); background: var(--bg-app); }
.calendar-day.today .day-number, .cal-day.today .day-number {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 999px;
  background: var(--brand-gradient); color: #fff; font-weight: 700;
}
.day-number { font-size: 12.5px; font-weight: 600; color: var(--text-secondary); }
.cal-event {
  display: block; margin-top: 4px;
  padding: 3px 8px;
  font-size: 11.5px; font-weight: 600;
  border-radius: 6px;
  background: var(--brand-gradient-soft);
  color: var(--brand-1);
  border-left: 3px solid var(--brand-2);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ============================================================
   RECEITAS — catálogo estilo marketplace
   ============================================================ */
.recipe-grid, .recipes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}
.recipe-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column;
  transition: transform var(--transition-slow), box-shadow var(--transition), border-color var(--transition);
}
.recipe-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: var(--border-base);
}
.recipe-card .recipe-thumb,
.recipe-card .thumb {
  aspect-ratio: 4 / 3;
  background: var(--brand-gradient-soft);
  display: flex; align-items: center; justify-content: center;
  font-size: 56px;
  color: var(--brand-2);
}
.recipe-card .recipe-body, .recipe-card .body { padding: 16px 18px; }
.recipe-card .recipe-title, .recipe-card h4 {
  font-size: 15px; font-weight: 700;
  margin: 0 0 4px;
}
.recipe-card .recipe-meta, .recipe-card .meta {
  font-size: 12px; color: var(--text-muted);
}
.recipe-card .recipe-price {
  font-size: 17px; font-weight: 700;
  background: var(--brand-gradient);
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
}

/* ============================================================
   BACKUP BAR
   ============================================================ */
.backup-bar {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  margin: 0 32px 18px;
  padding: 12px 16px;
  background: var(--warning-soft);
  color: #92400E;
  border: 1px solid rgba(245,158,11,.25);
  border-radius: var(--radius-md);
  font-size: 13px; font-weight: 500;
}

/* ============================================================
   TOAST (compatível com #toast-container existente)
   ============================================================ */
#toast-container {
  position: fixed; bottom: 24px; right: 24px;
  z-index: 9998; display: flex; flex-direction: column; gap: 10px;
}
.toast {
  background: var(--bg-surface);
  color: var(--text-primary);
  border: 1px solid var(--border-base);
  border-left: 4px solid var(--brand-2);
  border-radius: var(--radius-md);
  padding: 12px 16px;
  box-shadow: var(--shadow-lg);
  font-size: 13.5px; font-weight: 500;
  min-width: 240px;
  animation: vxToastIn .25s var(--ease-out);
}
.toast.success { border-left-color: var(--success); }
.toast.error   { border-left-color: var(--danger); }
.toast.warning { border-left-color: var(--warning); }
@keyframes vxToastIn { from { opacity: 0; transform: translateX(20px) } to { opacity: 1; transform: none } }

/* ============================================================
   LOADING SCREEN
   ============================================================ */
#loading-screen {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--bg-app);
  gap: 14px;
}
.loading-logo {
  font-size: 44px;
  width: 72px; height: 72px;
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  background: var(--brand-gradient);
  color: #fff;
  box-shadow: var(--shadow-brand);
  animation: vxFloat 2.4s ease-in-out infinite;
}
@keyframes vxFloat { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-6px) } }
.loading-text { color: var(--text-secondary); font-size: 14px; font-weight: 500; }
.loading-bar {
  width: 180px; height: 4px; border-radius: 999px;
  background: var(--bg-muted); overflow: hidden;
}
.loading-fill {
  height: 100%; width: 40%;
  background: var(--brand-gradient);
  border-radius: 999px;
  animation: vxLoad 1.4s ease-in-out infinite;
}
@keyframes vxLoad {
  0%   { transform: translateX(-100%) }
  100% { transform: translateX(250%) }
}

/* ============================================================
   RESPONSIVO
   ============================================================ */
@media (max-width: 960px) {
  .sidebar { position: fixed; z-index: 60; transform: translateX(-100%); transition: transform var(--transition); }
  .sidebar.open { transform: translateX(0); }
  #menu-toggle { display: inline-flex; }
  #sidebar-toggle { display: none; }
  .section { padding: 20px 18px 50px; }
  .top-header { padding: 0 18px; }
}

/* ============================================================
   UTIL — tooltip da sidebar colapsada
   ============================================================ */
.sidebar.collapsed .nav-link[title]:hover::after {
  content: attr(title);
  position: absolute; left: calc(100% + 10px); top: 50%;
  transform: translateY(-50%);
  background: #0B1220; color: #fff;
  padding: 6px 10px; border-radius: 8px;
  font-size: 12px; font-weight: 500; white-space: nowrap;
  box-shadow: var(--shadow-lg);
  z-index: 100;
}


/* ===== css/theme-palettes.css ===== */
/* ============================================================
   BALLOONGESTOR PRO — PALETAS DE TEMA
   Sobrescreve apenas tokens de cor (não toca em layout/lógica).
   ============================================================ */

/* ROSA ELEGANTE (padrão) */
[data-palette="rosa"] {
  --brand-1: #EC4899;
  --brand-2: #F472B6;
  --brand-3: #F9A8D4;
  --brand-gradient: linear-gradient(135deg, #BE185D 0%, #EC4899 50%, #F9A8D4 100%);
  --brand-gradient-soft: linear-gradient(135deg, rgba(236,72,153,.12), rgba(249,168,212,.14));
  --nav-bg: #2A1426; --nav-bg-2: #3B1B33;
  --nav-active: rgba(236, 72, 153, 0.22);
  --nav-active-border: rgba(249, 168, 212, 0.65);
  --nav-text-active: #FFE4F1;
  --shadow-brand: 0 10px 30px -10px rgba(236, 72, 153, .45);
  --shadow-glow:  0 0 0 4px rgba(236, 72, 153, .14);
}

/* AZUL PROFISSIONAL */
[data-palette="azul"] {
  --brand-1: #3B82F6; --brand-2: #60A5FA; --brand-3: #93C5FD;
  --brand-gradient: linear-gradient(135deg, #1D4ED8 0%, #3B82F6 50%, #93C5FD 100%);
  --brand-gradient-soft: linear-gradient(135deg, rgba(59,130,246,.12), rgba(147,197,253,.14));
  --nav-bg: #0B1220; --nav-bg-2: #111A2E;
  --nav-active: rgba(59, 130, 246, 0.22);
  --nav-active-border: rgba(96, 165, 250, 0.65);
  --nav-text-active: #E0F2FE;
  --shadow-brand: 0 10px 30px -10px rgba(59, 130, 246, .45);
  --shadow-glow:  0 0 0 4px rgba(59, 130, 246, .14);
}

/* LILÁS PREMIUM */
[data-palette="lilas"] {
  --brand-1: #A855F7; --brand-2: #C084FC; --brand-3: #E9D5FF;
  --brand-gradient: linear-gradient(135deg, #7C3AED 0%, #A855F7 50%, #E9D5FF 100%);
  --brand-gradient-soft: linear-gradient(135deg, rgba(168,85,247,.12), rgba(233,213,255,.14));
  --nav-bg: #1F1430; --nav-bg-2: #2C1B45;
  --nav-active: rgba(168, 85, 247, 0.22);
  --nav-active-border: rgba(196, 132, 252, 0.65);
  --nav-text-active: #F3E8FF;
  --shadow-brand: 0 10px 30px -10px rgba(168, 85, 247, .45);
  --shadow-glow:  0 0 0 4px rgba(168, 85, 247, .14);
}

/* VERDE ESMERALDA */
[data-palette="verde"] {
  --brand-1: #10B981; --brand-2: #34D399; --brand-3: #6EE7B7;
  --brand-gradient: linear-gradient(135deg, #047857 0%, #10B981 50%, #6EE7B7 100%);
  --brand-gradient-soft: linear-gradient(135deg, rgba(16,185,129,.12), rgba(110,231,183,.14));
  --nav-bg: #0F1F18; --nav-bg-2: #16302A;
  --nav-active: rgba(16, 185, 129, 0.22);
  --nav-active-border: rgba(52, 211, 153, 0.65);
  --nav-text-active: #D1FAE5;
  --shadow-brand: 0 10px 30px -10px rgba(16, 185, 129, .45);
  --shadow-glow:  0 0 0 4px rgba(16, 185, 129, .14);
}

/* LARANJA VIBRANTE */
[data-palette="laranja"] {
  --brand-1: #F97316; --brand-2: #FB923C; --brand-3: #FED7AA;
  --brand-gradient: linear-gradient(135deg, #C2410C 0%, #F97316 50%, #FED7AA 100%);
  --brand-gradient-soft: linear-gradient(135deg, rgba(249,115,22,.12), rgba(254,215,170,.16));
  --nav-bg: #251510; --nav-bg-2: #381E15;
  --nav-active: rgba(249, 115, 22, 0.22);
  --nav-active-border: rgba(251, 146, 60, 0.65);
  --nav-text-active: #FFEDD5;
  --shadow-brand: 0 10px 30px -10px rgba(249, 115, 22, .45);
  --shadow-glow:  0 0 0 4px rgba(249, 115, 22, .14);
}

/* PRETO PREMIUM */
[data-palette="preto"] {
  --brand-1: #111827; --brand-2: #374151; --brand-3: #9CA3AF;
  --brand-gradient: linear-gradient(135deg, #000000 0%, #1F2937 60%, #4B5563 100%);
  --brand-gradient-soft: linear-gradient(135deg, rgba(17,24,39,.10), rgba(75,85,99,.10));
  --nav-bg: #050505; --nav-bg-2: #111111;
  --nav-active: rgba(255, 255, 255, 0.10);
  --nav-active-border: rgba(255, 255, 255, 0.45);
  --nav-text-active: #FFFFFF;
  --shadow-brand: 0 10px 30px -10px rgba(0, 0, 0, .55);
  --shadow-glow:  0 0 0 4px rgba(255, 255, 255, .08);
}

/* ============================================================
   SELETOR DE TEMA (topo) + BOTÃO "LIMPAR TUDO"
   ============================================================ */
.palette-control {
  display: inline-flex; align-items: center; gap: 8px;
}
.palette-label {
  font: 600 12px/1 var(--font-sans);
  color: var(--text-secondary);
  letter-spacing: .01em;
  white-space: nowrap;
}
.palette-select {
  appearance: none; -webkit-appearance: none;
  background: var(--bg-surface);
  border: 1px solid var(--border-base);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font: 500 13px/1 var(--font-sans);
  padding: 8px 30px 8px 12px;
  background-image: linear-gradient(45deg, transparent 50%, var(--text-muted) 50%),
                    linear-gradient(135deg, var(--text-muted) 50%, transparent 50%);
  background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
  background-size: 5px 5px, 5px 5px;
  background-repeat: no-repeat;
  cursor: pointer;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.palette-select:hover { border-color: var(--brand-1); }
.palette-select:focus { outline: none; border-color: var(--brand-1); box-shadow: var(--shadow-glow); }

.btn-clear-all {
  display: inline-flex; align-items: center; gap: 6px;
  background: transparent; color: var(--danger);
  border: 1px solid rgba(239,68,68,.28);
  border-radius: var(--radius-sm);
  padding: 8px 14px;
  font: 600 13px/1 var(--font-sans);
  cursor: pointer;
  transition: background var(--transition), border-color var(--transition), color var(--transition);
}
.btn-clear-all:hover { background: var(--danger-soft); border-color: var(--danger); }

/* ============================================================
   SELETOR DE TEMA — Configurações (radio list profissional)
   ============================================================ */
.theme-radio-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; margin-top: 8px; }
.theme-radio-card {
  position: relative;
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  background: var(--bg-surface);
  border: 1.5px solid var(--border-base);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
}
.theme-radio-card:hover { border-color: var(--brand-1); background: var(--brand-gradient-soft); }
.theme-radio-card input[type="radio"] { position: absolute; opacity: 0; pointer-events: none; }
.theme-radio-card .theme-swatch {
  width: 28px; height: 28px; border-radius: 999px;
  flex-shrink: 0;
  box-shadow: inset 0 0 0 2px rgba(255,255,255,.5), 0 2px 6px rgba(0,0,0,.12);
}
.theme-radio-card .theme-name {
  font: 600 14px/1.2 var(--font-sans);
  color: var(--text-primary);
}
.theme-radio-card .theme-check {
  margin-left: auto;
  width: 22px; height: 22px; border-radius: 999px;
  border: 2px solid var(--border-strong);
  display: grid; place-items: center;
  color: transparent;
  font-weight: 800; font-size: 13px;
  transition: all var(--transition);
}
.theme-radio-card.is-active {
  border-color: var(--brand-1);
  background: var(--brand-gradient-soft);
  box-shadow: var(--shadow-glow);
}
.theme-radio-card.is-active .theme-check {
  background: var(--brand-1); border-color: var(--brand-1); color: #fff;
}

/* ============================================================
   MODAL DE CONFIRMAÇÃO "LIMPAR TUDO"
   ============================================================ */
.confirm-overlay {
  position: fixed; inset: 0;
  background: rgba(15, 23, 42, 0.55);
  backdrop-filter: blur(6px);
  display: none; align-items: center; justify-content: center;
  z-index: 2000; padding: 16px;
}
.confirm-overlay.is-open { display: flex; }
.confirm-card {
  background: var(--bg-surface);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-xl);
  width: 100%; max-width: 460px;
  padding: 28px;
  border: 1px solid var(--border-base);
  animation: confirmIn .22s var(--ease-out);
}
@keyframes confirmIn { from { opacity: 0; transform: translateY(8px) scale(.98); } to { opacity: 1; transform: none; } }
.confirm-icon {
  width: 48px; height: 48px; border-radius: 14px;
  display: grid; place-items: center;
  background: var(--danger-soft); color: var(--danger);
  font-size: 24px; margin-bottom: 14px;
}
.confirm-title { font-size: 18px; font-weight: 700; color: var(--text-primary); margin: 0 0 6px; }
.confirm-desc  { font-size: 14px; color: var(--text-secondary); line-height: 1.55; margin: 0 0 22px; }
.confirm-actions { display: flex; gap: 10px; justify-content: flex-end; }
.confirm-actions .btn-cancel,
.confirm-actions .btn-danger {
  border-radius: var(--radius-sm);
  padding: 10px 18px;
  font: 600 13px/1 var(--font-sans);
  cursor: pointer;
  border: 1px solid transparent;
  transition: background var(--transition), border-color var(--transition), color var(--transition);
}
.confirm-actions .btn-cancel { background: var(--bg-subtle); color: var(--text-primary); border-color: var(--border-base); }
.confirm-actions .btn-cancel:hover { background: var(--bg-muted); }
.confirm-actions .btn-danger { background: var(--danger); color: #fff; }
.confirm-actions .btn-danger:hover { filter: brightness(.95); }

<script>
/* ===== js/theme-manager.js ===== */
/* ============================================================
   CRM Personalizados — Theme Manager + Clear All
   - 6 paletas; preferência salva em LocalStorage.
   - Sincroniza seletor do topo e tela Configurações via evento.
   - Botão "Limpar tudo" com modal de confirmação customizado.
   ============================================================ */
(function () {
  'use strict';

  var PALETTE_KEY = 'bgp_palette';
  var DEFAULT_PALETTE = 'rosa';

  var PALETTES = [
    { id: 'rosa',    label: 'Rosa Elegante',    color: '#EC4899' },
    { id: 'azul',    label: 'Azul Profissional', color: '#3B82F6' },
    { id: 'lilas',   label: 'Lilás Premium',    color: '#A855F7' },
    { id: 'verde',   label: 'Verde Esmeralda',  color: '#10B981' },
    { id: 'laranja', label: 'Laranja Vibrante', color: '#F97316' },
    { id: 'preto',   label: 'Preto Premium',    color: '#111827' }
  ];

  var listeners = [];

  function getPalette() {
    var v = null;
    try { v = localStorage.getItem(PALETTE_KEY); } catch (e) {}
    return PALETTES.some(function (p) { return p.id === v; }) ? v : DEFAULT_PALETTE;
  }
  function setPalette(id) {
    if (!PALETTES.some(function (p) { return p.id === id; })) return;
    document.documentElement.setAttribute('data-palette', id);
    try { localStorage.setItem(PALETTE_KEY, id); } catch (e) {}
    // Sincroniza seletor do topo
    var sel = document.getElementById('palette-select');
    if (sel && sel.value !== id) sel.value = id;
    // Notifica ouvintes (ex.: tela Configurações)
    listeners.forEach(function (cb) { try { cb(id); } catch (e) {} });
    try {
      document.dispatchEvent(new CustomEvent('palette:change', { detail: { id: id } }));
    } catch (e) {}
  }
  function onChange(cb) { if (typeof cb === 'function') listeners.push(cb); }

  // Aplica o quanto antes (evita flash)
  document.documentElement.setAttribute('data-palette', getPalette());

  function buildHeaderControls() {
    var actions = document.querySelector('.top-header .header-actions');
    if (!actions || document.getElementById('palette-select')) return;

    var wrap = document.createElement('div');
    wrap.className = 'palette-control';

    var label = document.createElement('span');
    label.className = 'palette-label';
    label.innerHTML = '🎨 Tema do sistema';

    var select = document.createElement('select');
    select.id = 'palette-select';
    select.className = 'palette-select';
    select.title = 'Escolher o tema do sistema';
    select.setAttribute('aria-label', 'Tema do sistema');
    PALETTES.forEach(function (p) {
      var opt = document.createElement('option');
      opt.value = p.id; opt.textContent = p.label;
      select.appendChild(opt);
    });
    select.value = getPalette();
    select.addEventListener('change', function () { setPalette(select.value); });

    wrap.appendChild(label);
    wrap.appendChild(select);

    var clearBtn = document.createElement('button');
    clearBtn.id = 'clear-all-btn';
    clearBtn.className = 'btn-clear-all';
    clearBtn.type = 'button';
    clearBtn.title = 'Apagar todos os dados salvos neste navegador';
    clearBtn.innerHTML = '<span aria-hidden="true">🗑️\x3C/span> Limpar tudo';
    clearBtn.addEventListener('click', openConfirm);

    var themeToggle = actions.querySelector('#theme-toggle');
    if (themeToggle) {
      actions.insertBefore(wrap, themeToggle);
      actions.insertBefore(clearBtn, themeToggle);
    } else {
      actions.appendChild(wrap);
      actions.appendChild(clearBtn);
    }
  }

  function buildConfirmModal() {
    if (document.getElementById('clear-all-modal')) return;
    var overlay = document.createElement('div');
    overlay.id = 'clear-all-modal';
    overlay.className = 'confirm-overlay';
    overlay.innerHTML = ''
      + '<div class="confirm-card" role="dialog" aria-modal="true" aria-labelledby="clear-all-title">'
      +   '<div class="confirm-icon" aria-hidden="true">⚠️\x3C/div>'
      +   '<h3 id="clear-all-title" class="confirm-title">Tem certeza que deseja limpar todo o sistema?\x3C/h3>'
      +   '<p class="confirm-desc">Essa ação vai apagar clientes, eventos, estoque, finanças, fornecedores e demais dados salvos neste navegador. Use somente se quiser começar do zero.\x3C/p>'
      +   '<div class="confirm-actions">'
      +     '<button type="button" class="btn-cancel" data-action="cancel">Cancelar\x3C/button>'
      +     '<button type="button" class="btn-danger" data-action="confirm">Sim, limpar tudo\x3C/button>'
      +   '\x3C/div>'
      + '\x3C/div>';
    document.body.appendChild(overlay);

    overlay.addEventListener('click', function (e) {
      if (e.target === overlay) closeConfirm();
      var action = e.target.getAttribute && e.target.getAttribute('data-action');
      if (action === 'cancel') closeConfirm();
      if (action === 'confirm') doClearAll();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeConfirm();
    });
  }

  function openConfirm()  { var m = document.getElementById('clear-all-modal'); if (m) m.classList.add('is-open'); }
  function closeConfirm() { var m = document.getElementById('clear-all-modal'); if (m) m.classList.remove('is-open'); }

  function toast(msg) {
    try {
      if (typeof window.showToast === 'function') return window.showToast(msg, 'success');
    } catch (e) {}
    var el = document.createElement('div');
    el.textContent = msg;
    el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#10B981;color:#fff;padding:12px 18px;border-radius:10px;font:600 14px Inter,system-ui;box-shadow:0 10px 30px -10px rgba(16,185,129,.5);z-index:9999';
    document.body.appendChild(el);
    setTimeout(function () { el.remove(); }, 2200);
  }

  function deleteIndexedDB() {
    return new Promise(function (resolve) {
      try {
        var name = (window.APP_CONFIG && APP_CONFIG.db && APP_CONFIG.db.name) || 'BalloonBusinessDB';
        try { if (window.DB && DB._db) DB._db.close(); } catch (e) {}
        var req = indexedDB.deleteDatabase(name);
        req.onsuccess = req.onerror = req.onblocked = function () { resolve(); };
      } catch (e) { resolve(); }
    });
  }

  function doClearAll() {
    closeConfirm();
    var preservedPalette = getPalette();
    var preservedTheme = null;
    try { preservedTheme = localStorage.getItem('theme'); } catch (e) {}
    try { localStorage.clear(); } catch (e) {}
    try { sessionStorage.clear(); } catch (e) {}
    try { localStorage.setItem(PALETTE_KEY, preservedPalette); } catch (e) {}
    if (preservedTheme) { try { localStorage.setItem('theme', preservedTheme); } catch (e) {} }
    deleteIndexedDB().then(function () {
      toast('Sistema limpo com sucesso.');
      setTimeout(function () { window.location.reload(); }, 900);
    });
  }

  // API pública
  window.ThemeManager = {
    palettes: PALETTES,
    get: getPalette,
    set: setPalette,
    onChange: onChange
  };

  document.addEventListener('DOMContentLoaded', function () {
    buildHeaderControls();
    buildConfirmModal();
  });
})();

</script>
</head>

let _mutationCount = 0;
function trackMutation() {
  _mutationCount++;
  if (APP_CONFIG.backupReminder && _mutationCount >= APP_CONFIG.backupReminderCount) {
    _mutationCount = 0;
    const snoozedUntil = parseInt(localStorage.getItem('backup_snoozed_until') || '0');

    const bar = document.getElementById('backup-reminder');

}

;
/* ===== js/auth.js ===== */
/* ============================================================

   Inspirado no spec VŒUX. 100% client-side, sem backend.
   Storage: localStorage
     - balao_users    → array de usuários

(function () {

  const LS_USERS   = 'balao_users';

  /* ---------- Util ---------- */
  function vxNormalize(s) {
    return (s || '')
      .toString()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .toLowerCase()
      .trim()
      .replace(/\s+/g, ' ');
  }
  async function sha256(text) {
    const buf = new TextEncoder().encode(text);
    const hash = await crypto.subtle.digest('SHA-256', buf);
    return Array.from(new Uint8Array(hash))
      .map(b => b.toString(16).padStart(2, '0')).join('');
  }
  const readUsers  = () => { try { return JSON.parse(localStorage.getItem(LS_USERS)) || []; } catch { return []; } };
  const writeUsers = (u) => localStorage.setItem(LS_USERS, JSON.stringify(u));
  const readSession  = () => { try { return JSON.parse(localStorage.getItem(LS_SESSION)); } catch { return null; } };
  const writeSession = (s) => localStorage.setItem(LS_SESSION, JSON.stringify(s));
  const clearSession = () => localStorage.removeItem(LS_SESSION);

  /* ---------- Toast ---------- */

      c.id = 'balao-toast-container';
      document.body.appendChild(c);
    }
    const t = document.createElement('div');
    t.className = 'balao-toast balao-toast-' + type;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => { t.classList.add('show'); }, 10);
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2800);
  }
  window.balaoToast = showToast;

  /* ---------- Estilos ---------- */
  const css = `

  /* Botão sair na topbar */
  #balao-logout-top { background:transparent; border:none; cursor:pointer;

  body.balao-locked > #app, body.balao-locked > #loading-screen { display:none !important; }
  `;
  const styleEl = document.createElement('style');

  /* ---------- Bootstrap usuário demo ---------- */

  /* ---------- HTML do modal ---------- */
  function questionOptions(selected) {
    return SECRET_QUESTIONS.map(q =>
      `<option value="${q}"${selected === q ? ' selected' : ''}>${q}\x3C/option>`
    ).join('');
  }
  function buildModal() {
    const wrap = document.createElement('div');
    wrap.id = 'balao-auth';

          <div class="balao-msg" id="balao-rec1-msg">\x3C/div>
        \x3C/div>

        <!-- RECUPERAÇÃO ETAPA 2 -->
        <div class="balao-panel" data-panel="rec2">
          <div class="balao-stepper">
            <span class="balao-step">Conta\x3C/span><span class="balao-step-sep">→\x3C/span>
            <span class="balao-step active">● Segurança\x3C/span><span class="balao-step-sep">→\x3C/span>

          \x3C/div>
          <h1 class="balao-title">Confirmar Identidade\x3C/h1>

          <div class="balao-question-box" id="balao-rec-qbox">—\x3C/div>

  /* ---------- Lógica do modal ---------- */
  let recoverContext = { username: null };

  function showPanel(name) {
    document.querySelectorAll('#balao-auth .balao-panel').forEach(p => {
      p.classList.toggle('active', p.dataset.panel === name);
    });
    const card = document.getElementById('balao-card');
    if (card) card.classList.toggle('wide', name.startsWith('rec'));
    if (name === 'login')    showToast('Tela de login', 'love');
    if (name === 'register') showToast('Criar nova conta', 'love');
    if (name === 'rec1')     showToast('Recuperação de senha: informe seu usuário', 'love');
  }
  function setMsg(id, text, ok) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = text || '';
    el.className = 'balao-msg ' + (text ? (ok ? 'ok' : 'err') : '');
  }

  async function doLogin() {
    const u = vxNormalize(document.getElementById('balao-login-user').value);
    const p = document.getElementById('balao-login-pass').value;
    setMsg('balao-login-msg', '');
    if (!u) { setMsg('balao-login-msg', 'Informe o usuário', false); showToast('Informe o usuário', 'error'); return; }
    if (!p) { setMsg('balao-login-msg', 'Informe a senha',    false); showToast('Informe a senha',    'error'); return; }
    const user = readUsers().find(x => vxNormalize(x.username) === u);
    if (!user) { setMsg('balao-login-msg', 'Usuário não encontrado', false); showToast('Usuário não encontrado', 'error'); return; }
    const hash = await sha256(p);
    if (hash !== user.passwordHash) {
      setMsg('balao-login-msg', 'Senha incorreta', false);
      showToast('Senha incorreta', 'error'); return;
    }
    writeSession({ username: user.username, loggedIn: true, loginAt: new Date().toISOString() });
    showToast('Bem-vindo(a), ' + user.username + ' ✓', 'success');
    setTimeout(() => location.reload(), 600);
  }

  async function doRegister() {
    const u  = document.getElementById('balao-reg-user').value.trim();
    const p1 = document.getElementById('balao-reg-pass').value;
    const p2 = document.getElementById('balao-reg-pass2').value;
    const q  = document.getElementById('balao-reg-question').value;
    const a  = document.getElementById('balao-reg-answer').value;
    setMsg('balao-reg-msg', '');
    if (!u)                 { setMsg('balao-reg-msg', 'Informe o usuário', false); showToast('Informe o usuário', 'error'); return; }
    if (!p1 || p1.length<6) { setMsg('balao-reg-msg', 'Senha mínima de 6 caracteres', false); showToast('Senha mínima de 6 caracteres', 'error'); return; }
    if (p1 !== p2)          { setMsg('balao-reg-msg', 'As senhas não conferem', false); showToast('As senhas não conferem', 'error'); return; }
    if (!a.trim())          { setMsg('balao-reg-msg', 'Informe a resposta secreta', false); showToast('Informe a resposta secreta', 'error'); return; }
    const users = readUsers();
    if (users.some(x => vxNormalize(x.username) === vxNormalize(u))) {
      setMsg('balao-reg-msg', 'Esse usuário já existe', false);
      showToast('Esse usuário já existe', 'error'); return;
    }
    users.push({
      username: u,
      passwordHash: await sha256(p1),
      secretQuestion: q,
      secretAnswerHash: await sha256(vxNormalize(a)),
      createdAt: new Date().toISOString()
    });
    writeUsers(users);
    setMsg('balao-reg-msg', 'Conta criada com sucesso ✓', true);
    showToast('Conta criada com sucesso ✓', 'success');
    setTimeout(() => showPanel('login'), 900);
  }

  function doRec1() {
    const u = vxNormalize(document.getElementById('balao-rec-user').value);
    setMsg('balao-rec1-msg', '');
    if (!u) { setMsg('balao-rec1-msg', 'Informe o usuário', false); showToast('Informe o usuário', 'error'); return; }
    const user = readUsers().find(x => vxNormalize(x.username) === u);
    if (!user) { setMsg('balao-rec1-msg', 'Conta não encontrada', false); showToast('Conta não encontrada', 'error'); return; }
    recoverContext.username = user.username;
    document.getElementById('balao-rec-qbox').textContent = user.secretQuestion;
    showToast('Conta encontrada ✓', 'success');
    showPanel('rec2');
  }
  async function doRec2() {

/* ===== js/utils/format.js ===== */
/* Formatadores — datas, moeda, números (pt-BR) */

function formatCurrency(val) {
  const n = parseFloat(val) || 0;
  return (APP_CONFIG.currency || 'R$ ') +
    n.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d),)/g, '.');
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
}

function formatDateShort(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleDateString('pt-BR');
}

function formatDateTime(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function formatPercent(val) {
  return (parseFloat(val) || 0).toFixed(1).replace('.', ',') + '%';
}

function formatNumber(val) {
  return (parseFloat(val) || 0).toLocaleString('pt-BR');
}

function toInputDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return '';
  return d.toISOString().slice(0, 10);
}

function relativeTime(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const diff = Date.now() - d.getTime();
  const days = Math.floor(diff / 86400000);
  if (days === 0) return 'Hoje';
  if (days === 1) return 'Ontem';
  if (days < 7) return 'há ' + days + ' dias';
  if (days < 30) return 'há ' + Math.floor(days / 7) + ' semanas';
  if (days < 365) return 'há ' + Math.floor(days / 30) + ' meses';
  return 'há ' + Math.floor(days / 365) + ' anos';
}

window.formatCurrency = formatCurrency;

window.formatDateShort = formatDateShort;
window.formatDateTime = formatDateTime;

window.formatNumber = formatNumber;

/* ===== js/utils/helpers.js ===== */
/* Misc helper utilities */

function debounce(fn, ms = 300) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/\x3C/g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function groupBy(arr, key) {
  return arr.reduce((acc, item) => {
    const k = typeof key === 'function' ? key(item) : item[key];
    (acc[k] = acc[k] || []).push(item);
    return acc;
  }, {});
}

function sumBy(arr, key) {
  return arr.reduce((sum, item) => sum + (parseFloat(typeof key === 'function' ? key(item) : item[key]) || 0), 0);
}

function sortBy(arr, key, dir = 'asc') {
  return [...arr].sort((a, b) => {
    const va = typeof key === 'function' ? key(a) : a[key];
    const vb = typeof key === 'function' ? key(b) : b[key];
    if (va < vb) return dir === 'asc' ? -1 : 1;
    if (va > vb) return dir === 'asc' ? 1 : -1;
    return 0;
  });
}

function filterByDateRange(arr, field, start, end) {
  return arr.filter(item => {
    const d = new Date(item[field]);
    if (isNaN(d)) return false;
    if (start && d < new Date(start)) return false;
    if (end && d > new Date(end + 'T23:59:59')) return false;
    return true;
  });
}

function getDateRange(preset) {
  const now = new Date();
  const today = now.toISOString().slice(0, 10);
  switch (preset) {
    case 'today': return { start: today, end: today };
    case '7days': {
      const s = new Date(now); s.setDate(s.getDate() - 6);
      return { start: s.toISOString().slice(0, 10), end: today };
    }
    case '30days': {
      const s = new Date(now); s.setDate(s.getDate() - 29);
      return { start: s.toISOString().slice(0, 10), end: today };
    }
    case 'thisMonth': {
      const s = new Date(now.getFullYear(), now.getMonth(), 1);
      return { start: s.toISOString().slice(0, 10), end: today };
    }
    case 'lastMonth': {
      const s = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      const e = new Date(now.getFullYear(), now.getMonth(), 0);
      return { start: s.toISOString().slice(0, 10), end: e.toISOString().slice(0, 10) };
    }
    case 'thisYear': {
      const s = new Date(now.getFullYear(), 0, 1);
      return { start: s.toISOString().slice(0, 10), end: today };
    }
    default: return { start: null, end: null };
  }
}

}

function showToast(msg, type = 'success') {
  const container = document.getElementById('toast-container');
  if (!container) return;
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.innerHTML = `<span>${escapeHtml(msg)}\x3C/span><button onclick="this.parentElement.remove()">×\x3C/button>`;
  container.appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3500);
}

function confirmDialog(msg, options = {}) {
  return new Promise(resolve => {
    const {
      confirmText,
      confirmClass = 'btn-danger',
      icon,
      detail,
      title,
    } = options;
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay active';
    syncModalBodyLock();
    const i18n = typeof I18n !== 'undefined' ? I18n : null;
    const titleText = title || (i18n ? i18n.t('confirm.title') : 'Confirmar');
    const cancelText = i18n ? i18n.t('btn.cancel') : 'Cancelar';
    const confirmLabel = confirmText || (i18n ? i18n.t('btn.delete') : 'Excluir');
    overlay.innerHTML = `
      <div class="modal confirm-modal" style="max-width:420px">
        ${icon ? `<div class="confirm-icon-wrap"><span class="confirm-icon">${icon}\x3C/span>\x3C/div>` : ''}
        <div class="modal-header confirm-modal-header"><h3>${escapeHtml(titleText)}\x3C/h3>\x3C/div>
        <div class="modal-body confirm-modal-body">
          <p class="confirm-message">${escapeHtml(msg)}\x3C/p>
          ${detail ? `<p class="confirm-detail">${escapeHtml(detail)}\x3C/p>` : ''}
        \x3C/div>
        <div class="modal-footer confirm-modal-footer">
          <button class="btn btn-ghost" id="confirm-no">${escapeHtml(cancelText)}\x3C/button>
          <button class="btn ${confirmClass}" id="confirm-yes">${escapeHtml(confirmLabel)}\x3C/button>
        \x3C/div>
      \x3C/div>`;
    document.body.appendChild(overlay);
    syncModalBodyLock();
    const close = (answer) => { overlay.remove(); syncModalBodyLock(); resolve(answer); };
    overlay.querySelector('#confirm-yes').onclick = () => close(true);
    overlay.querySelector('#confirm-no').onclick = () => close(false);
    overlay.addEventListener('click', e => { if (e.target === overlay) close(false); });
  });
}

function syncModalBodyLock() {
  if (!document.body) return;
  const hasOpenModal = !!document.querySelector('.modal-overlay.active, .confirm-overlay.is-open');
  document.body.classList.toggle('modal-open', hasOpenModal);
}

function openModal(id) {
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
  syncModalBodyLock();
}

function closeModal(id) {
  const el = document.getElementById(id);
  if (el) el.classList.remove('active');
  syncModalBodyLock();
}

function closeAllModals() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
  syncModalBodyLock();
}

if (typeof MutationObserver !== 'undefined') {
  const modalObserver = new MutationObserver(syncModalBodyLock);
  const startModalObserver = () => {
    if (!document.body) return;
    modalObserver.observe(document.body, { attributes: true, subtree: true, childList: true, attributeFilter: ['class'] });
    syncModalBodyLock();
  };
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', startModalObserver, { once: true });
  else startModalObserver();
}

async function exportFullBackup() {
  const stores = APP_CONFIG.db.stores;
  const data = { _meta: { exported: new Date().toISOString(), version: APP_CONFIG.version }, };
  for (const store of stores) {
    data[store] = await DB.getAll(store);
  }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `balloon-business-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Backup exportado com sucesso!', 'success');
  const bar = document.getElementById('backup-reminder');
  if (bar) bar.classList.add('hidden');
}

async function importFullBackup(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const data = JSON.parse(e.target.result);
        for (const store of APP_CONFIG.db.stores) {
          if (data[store] && Array.isArray(data[store])) {
            await DB.clearStore(store);
            for (const record of data[store]) {
              await DB.put(store, record);
            }
          }
        }
        showToast('Backup restaurado com sucesso!', 'success');
        resolve(data);
      } catch (err) {
        showToast('Falha na importação: ' + err.message, 'error');
        reject(err);
      }
    };
    reader.onerror = reject;
    reader.readAsText(file);
  });
}

function exportTableToCSV(headers, rows, filename) {
  const lines = [headers.join(',')];
  rows.forEach(row => {
    lines.push(row.map(cell => {
      const s = String(cell == null ? '' : cell).replace(/"/g, '""');
      return /[,"\n]/.test(s) ? `"${s}"` : s;
    }).join(','));
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename || 'export.csv';
  a.click();
  URL.revokeObjectURL(url);
}

window.exportFullBackup = exportFullBackup;
window.importFullBackup = importFullBackup;
window.exportTableToCSV = exportTableToCSV;

/* ===== js/storage/db.js ===== */
/* ============================================================
   IndexedDB Wrapper — BalloonBusinessDB
   ============================================================ */

const DB = (() => {
  let _db = null;

  function open() {
    return new Promise((resolve, reject) => {
      if (_db) return resolve(_db);
      const req = indexedDB.open(APP_CONFIG.db.name, APP_CONFIG.db.version);

      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        APP_CONFIG.db.stores.forEach(store => {
          if (!db.objectStoreNames.contains(store)) {
            db.createObjectStore(store, { keyPath: 'id' });
          }
        });
      };

      req.onsuccess = (e) => { _db = e.target.result; resolve(_db); };
      req.onerror = (e) => reject(e.target.error);
    });
  }

  function getAll(store) {
    return open().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(store, 'readonly');
      const req = tx.objectStore(store).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    }));
  }

  function get(store, id) {
    return open().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(store, 'readonly');
      const req = tx.objectStore(store).get(id);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    }));
  }

  function put(store, record) {
    return open().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(store, 'readwrite');
      const req = tx.objectStore(store).put(record);
      req.onsuccess = () => { trackMutation(); resolve(req.result); };
      req.onerror = () => reject(req.error);
    }));
  }

  function remove(store, id) {
    return open().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(store, 'readwrite');
      const req = tx.objectStore(store).delete(id);
      req.onsuccess = () => { trackMutation(); resolve(); };
      req.onerror = () => reject(req.error);
    }));
  }

  function clearStore(store) {
    return open().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(store, 'readwrite');
      const req = tx.objectStore(store).clear();
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    }));
  }

  function count(store) {
    return open().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction(store, 'readonly');
      const req = tx.objectStore(store).count();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    }));
  }

  return { open, getAll, get, put, remove, clearStore, count };
})();

window.DB = DB;

  function t(key, vars) {
    const lang = _strings[_lang] || _strings.en;
    let str = lang[key] ?? _strings.en[key] ?? key;
    if (vars) {
      Object.entries(vars).forEach(([k, v]) => {
        str = str.replace(new RegExp(`\\{${k}\\}`, 'g'), v);
      });
    }
    return str;
  }

  /* Map stored English status → translated display label */
  function translateStatus(s) {
    const map = {
      'Consulta':          'status.inquiry',
      'Orçado':           'status.quoted',
      'Fechado':           'status.booked',
      'Em Andamento':      'status.in_progress',
      'Concluído':        'status.completed',
      'Cancelado':        'status.cancelled',
      'Available':        'status.available',

      'Out':              'status.out_on_rental',

      'Under Maintenance':'status.under_maintenance',

      'Receita':           'status.income',
      'Despesa':          'status.expense',
      'Rascunho':            'status.draft',
      'Agendado':        'status.scheduled',
      'Publicado':           'status.posted',
      'Pendente':          'status.pending',
      'Enviado':          'status.shipped',
      'Recebido':         'status.received',
      'Devolvido':         'status.returned',
      'In Stock':         'status.in_stock',
      'Low Stock':        'status.low_stock',
      'Out of Stock':     'status.out_of_stock',
    };
    const key = map[s];
    return key ? t(key) : s;
  }

  async function load() {
    try {
      const stored = await DB.getAll('settings');
      const record = stored.find(r => r.id === 'config');
      if (record && record.language) _lang = record.language;
    } catch (e) { /* use default */ }
    applyStaticTranslations();
    return _lang;
  }

  async function setLanguage(lang) {
    if (!_strings[lang]) return;
    _lang = lang;
    try {
      const stored = await DB.getAll('settings');
      const record = stored.find(r => r.id === 'config') || { id: 'config' };
      await DB.put('settings', { ...record, language: lang, updatedAt: new Date().toISOString() });
    } catch (e) {}
    applyStaticTranslations();
    // Re-render the current active section
    const activeSection = document.querySelector('.section.active');
    if (activeSection) {
      const sectionId = activeSection.id.replace('section-', '');
      if (window.navigateTo) navigateTo(sectionId);
    }
  }

  function getCurrentLang() { return _lang; }

  function applyStaticTranslations() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      const translation = t(key);
      if (translation && translation !== key) el.textContent = translation;
    });
    // Update placeholders
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.getAttribute('data-i18n-placeholder');
      const translation = t(key);
      if (translation && translation !== key) el.setAttribute('placeholder', translation);
    });
    // Update global search placeholder
    const gs = document.getElementById('global-search');
    if (gs) gs.placeholder = t('misc.search_global');
    // Update backup bar
    const backupMsg = document.querySelector('.backup-bar span');
    if (backupMsg) backupMsg.textContent = t('backup.message');
  }

  return { t, translateStatus, load, setLanguage, getCurrentLang, applyStaticTranslations };
})();

const ClientsModule = (() => {
  let _clients = [];
  let _sortField = 'name';
  let _sortDir = 'asc';
  let _searchTerm = '';

  async function load() {
    _clients = await DB.getAll('clients');
    return _clients;
  }

  async function save(data) {
    const record = { ...data, id: data.id || generateId(), updatedAt: new Date().toISOString() };
    if (!record.createdAt) record.createdAt = record.updatedAt;
    await DB.put('clients', record);
    await load();
    return record;
  }

  async function remove(id) {
    await DB.remove('clients', id);
    await load();
  }

  function getAll() { return _clients; }

  function getById(id) { return _clients.find(c => c.id === id); }

  function getFiltered() {
    let list = [..._clients];
    if (_searchTerm) {
      const q = _searchTerm.toLowerCase();
      list = list.filter(c =>
        (c.name || '').toLowerCase().includes(q) ||
        (c.email || '').toLowerCase().includes(q) ||
        (c.phone || '').toLowerCase().includes(q)
      );
    }
    list = sortBy(list, _sortField, _sortDir);
    return list;
  }

  function setSort(field) {
    if (_sortField === field) _sortDir = _sortDir === 'asc' ? 'desc' : 'asc';
    else { _sortField = field; _sortDir = 'asc'; }
  }

  function setSearch(term) { _searchTerm = term; }

  async function getClientEvents(clientId) {
    const events = await DB.getAll('events');
    return events.filter(e => e.clientId === clientId);
  }

  async function getClientFinances(clientId) {
    const finances = await DB.getAll('finances');
    return finances.filter(f => f.clientId === clientId);
  }

  function renderList() {
    const list = getFiltered();
    const container = document.getElementById('clients-list');

      container.innerHTML = `<div class="empty-state"><div class="empty-icon">👥\x3C/div><p>${I18n.t('empty.clients')}\x3C/p>\x3C/div>`;

const EventsModule = (() => {

  async function load() {
    _events = await DB.getAll('events');

    const record = { ...data, id: data.id || generateId(), updatedAt: new Date().toISOString() };
    if (!record.createdAt) record.createdAt = record.updatedAt;
    await DB.put('events', record);
    await load();
    return record;
  }

  async function remove(id) {
    await DB.remove('events', id);
    await load();
  }

  function getAll() { return _events; }
  function getById(id) { return _events.find(e => e.id === id); }

  function getFiltered(statusOverride) {
    let list = [..._events];
    const status = statusOverride || _filterStatus;
    if (status !== 'all') list = list.filter(e => e.status === status);
    if (_searchTerm) {
      const q = _searchTerm.toLowerCase();
      list = list.filter(e =>
        (e.name || '').toLowerCase().includes(q) ||
        (e.clientName || '').toLowerCase().includes(q) ||
        (e.location || '').toLowerCase().includes(q)
      );
    }
    return sortBy(list, _sortField, _sortDir);
  }

  function getUpcoming(days = 30) {
    const now = new Date();
    const end = new Date(); end.setDate(end.getDate() + days);
    return _events.filter(e => {
      const d = new Date(e.date);
      return d >= now && d <= end && e.status !== 'Cancelado' && e.status !== 'Concluído';
    }).sort((a, b) => new Date(a.date) - new Date(b.date));
  }

  function setFilter(status) { _filterStatus = status; }
  function setSearch(term) { _searchTerm = term; }
  function setSort(field) {
    if (_sortField === field) _sortDir = _sortDir === 'asc' ? 'desc' : 'asc';

  return { load, save, remove, getAll, getById, getFiltered, getUpcoming, setFilter, setSearch, renderList, openForm, submitForm, deleteEvent, updateStatus };

const InventoryModule = (() => {
  let _items = [];
  let _sortField = 'name';
  let _sortDir = 'asc';
  let _filterCategory = 'all';
  let _searchTerm = '';

  const CATEGORIES = ['Balões','Balões Metalizados','Acessórios','Estruturas','Pesos','Bombas','Painéis','Materiais de Evento','Fitas','Confetes','Outros'];

  async function load() {
    _items = await DB.getAll('inventory');
    return _items;
  }

  async function save(data) {
    const record = { ...data, id: data.id || generateId(), updatedAt: new Date().toISOString() };
    await DB.put('inventory', record);
    await load();
    return record;
  }

  async function remove(id) {
    await DB.remove('inventory', id);
    await load();
  }

  function getAll() { return _items; }
  function getById(id) { return _items.find(i => i.id === id); }

  function getTotalValue() {
    return sumBy(_items, item => (item.quantity || 0) * (item.unitCost || 0));
  }

  function getLowStock() {
    return _items.filter(i => (i.quantity || 0) <= (i.reorderPoint || 10) && i.quantity > 0);
  }

  function getOutOfStock() {
    return _items.filter(i => (i.quantity || 0) === 0);
  }

  function getFiltered() {
    let list = [..._items];
    if (_filterCategory !== 'all') list = list.filter(i => i.category === _filterCategory);
    if (_searchTerm) {

const FinancesModule = (() => {
  let _records = [];
  let _filterType = 'all';
  let _filterCategory = 'all';

  const CATEGORIES = ['Receita de Evento','Sinal','Insumos','Equipamentos','Marketing','Mão de obra','Transporte','Locação','Software','Seguros','Contas (água/luz)','Diversos'];
  let _dateRange = { start: null, end: null };
  let _sortField = 'date';
  let _sortDir = 'desc';

  async function load() {
    _records = await DB.getAll('finances');
    return _records;
  }

  async function save(data) {
    const record = { ...data, id: data.id || generateId(), updatedAt: new Date().toISOString() };
    if (!record.createdAt) record.createdAt = record.updatedAt;
    await DB.put('finances', record);
    await load();
    return record;
  }

  async function remove(id) {
    await DB.remove('finances', id);
    await load();
  }

  function getAll() { return _records; }

  function getFiltered() {
    let list = [..._records];
    if (_filterType !== 'all') list = list.filter(r => r.type === _filterType);
    if (_filterCategory !== 'all') list = list.filter(r => r.category === _filterCategory);
    if (_dateRange.start || _dateRange.end) list = filterByDateRange(list, 'date', _dateRange.start, _dateRange.end);
    return sortBy(list, _sortField, _sortDir);
  }

  function getSummary(records) {
    const list = records || getFiltered();
    const income = sumBy(list.filter(r => r.type === 'income'), 'amount');
    const expenses = sumBy(list.filter(r => r.type === 'expense'), 'amount');
    const profit = income - expenses;
    const margin = income > 0 ? (profit / income) * 100 : 0;
    return { income, expenses, profit, margin };
  }

  function setFilter(type, category) {
    if (type !== undefined) _filterType = type;
    if (category !== undefined) _filterCategory = category;
  }

  function setDateRange(range) { _dateRange = range; }
  function setSort(field) {
    if (_sortField === field) _sortDir = _sortDir === 'asc' ? 'desc' : 'asc';
    else { _sortField = field; _sortDir = 'desc'; }
  }

  function renderList() {
    const container = document.getElementById('finances-list');
    if (!container) return;
    const list = getFiltered();
    const summary = getSummary(list);

    const statsEl = document.getElementById('finance-stats');
    if (statsEl) {
      statsEl.innerHTML = `
        <div class="kpi-card kpi-gold"><div class="kpi-icon">💰\x3C/div><div class="kpi-value">${formatCurrency(summary.income)}\x3C/div><div class="kpi-label">${I18n.t('kpi.total_income')}\x3C/div>\x3C/div>
        <div class="kpi-card kpi-danger"><div class="kpi-icon">💸\x3C/div><div class="kpi-value">${formatCurrency(summary.expenses)}\x3C/div><div class="kpi-label">${I18n.t('kpi.total_expenses')}\x3C/div>\x3C/div>
        <div class="kpi-card kpi-emerald"><div class="kpi-icon">📈\x3C/div><div class="kpi-value">${formatCurrency(summary.profit)}\x3C/div><div class="kpi-label">${I18n.t('kpi.net_profit')}\x3C/div>\x3C/div>
        <div class="kpi-card"><div class="kpi-icon">📊\x3C/div><div class="kpi-value">${formatPercent(summary.margin)}\x3C/div><div class="kpi-label">${I18n.t('kpi.profit_margin')}\x3C/div>\x3C/div>`;
    }

    if (!list.length) {

      date: document.getElementById('finance-date').value,
      description: document.getElementById('finance-description').value.trim(),

      paymentMethod: document.getElementById('finance-payment').value,
      eventId, eventName: event?.name || '',
      notes: document.getElementById('finance-notes').value.trim()
    };

    if (!data.amount) { showToast(I18n.t('toast.name_required', { field: I18n.t('table.amount') }), 'error'); return; }
    await save(data);
    closeModal('finance-modal');
    renderList();
