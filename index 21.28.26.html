  function getMonthlyData(months = 12) {
    const data = [];
    for (let i = months - 1; i >= 0; i--) {
      const d = new Date();
      d.setMonth(d.getMonth() - i);
      const y = d.getFullYear(), m = d.getMonth();
      const label = d.toLocaleDateString('pt-BR', { month: 'short', year: '2-digit' });
      const monthRecords = _records.filter(r => {
        if (!r.date) return false;
        const parts = r.date.split('-');
        return parseInt(parts[0]) === y && parseInt(parts[1]) - 1 === m;
      });
      data.push({
        label,
        income: sumBy(monthRecords.filter(r => r.type === 'income'), 'amount'),
        expenses: sumBy(monthRecords.filter(r => r.type === 'expense'), 'amount')
      });
    }
    return data;
  }

  function getExpenseByCategory() {
    const expenses = _records.filter(r => r.type === 'expense');
    const grouped = groupBy(expenses, 'category');
    return Object.entries(grouped).map(([cat, items]) => ({
      category: cat || 'Sem categoria',
      total: sumBy(items, 'amount')
    })).sort((a, b) => b.total - a.total);
  }

  return { load, save, remove, getAll, getFiltered, getSummary, setFilter, setDateRange, renderList, openForm, submitForm, deleteRecord, getMonthlyData, getExpenseByCategory };
})();

const RecipesModule = (() => {
  let _recipes = [];
  let _searchTerm = '';
  let _editPhotos = [];

  const DESIGN_TYPES = ['Arco de Balões','Guirlanda de Balões','Buquê de Balões','Centro de Mesa','Painel de Balões','Coluna de Balões','Design Orgânico','Esculturas de Balão','Outro'];

  async function load() {
    _recipes = await DB.getAll('recipes');
    return _recipes;
  }

  async function save(data) {
    const record = { ...data, id: data.id || generateId(), updatedAt: new Date().toISOString() };
    if (!record.createdAt) record.createdAt = record.updatedAt;
    await DB.put('recipes', record);
    await load();
    return record;
  }

  async function remove(id) {
    await DB.remove('recipes', id);
    await load();
  }

  function getAll() { return _recipes; }
  function getById(id) { return _recipes.find(r => r.id === id); }

  function getFiltered() {
    if (!_searchTerm) return _recipes;
    const q = _searchTerm.toLowerCase();
    return _recipes.filter(r => (r.name || '').toLowerCase().includes(q) || (r.designType || '').toLowerCase().includes(q));
  }

  function setSearch(term) { _searchTerm = term; }

  function calcRecipeCost(recipe) {
    const materialCost = (recipe.ingredients || []).reduce((sum, ing) => sum + ((ing.qty || 0) * (ing.unitCost || 0)), 0);
    const laborCost = (recipe.laborHours || 0) * (recipe.laborRate || 15);
    return { materialCost, laborCost, totalCost: materialCost + laborCost };
  }

  const TYPE_GRADIENTS = {
    'Arco de Balões':        'linear-gradient(135deg,#f472b6 0%,#ec4899 50%,#be185d 100%)',
    'Guirlanda de Balões':     'linear-gradient(135deg,#a78bfa 0%,#8b5cf6 50%,#6d28d9 100%)',
    'Buquê de Balões':     'linear-gradient(135deg,#fbbf24 0%,#f59e0b 50%,#d97706 100%)',
    'Centro de Mesa': 'linear-gradient(135deg,#34d399 0%,#10b981 50%,#059669 100%)',
    'Painel de Balões':        'linear-gradient(135deg,#60a5fa 0%,#3b82f6 50%,#1d4ed8 100%)',
    'Coluna de Balões':      'linear-gradient(135deg,#fb923c 0%,#f97316 50%,#ea580c 100%)',
    'Design Orgânico':      'linear-gradient(135deg,#f9a8d4 0%,#ec4899 50%,#a21caf 100%)',
    'Esculturas de Balão':    'linear-gradient(135deg,#6ee7b7 0%,#34d399 50%,#059669 100%)',
    'Outro':               'linear-gradient(135deg,#94a3b8 0%,#64748b 50%,#475569 100%)',
  };
  const TYPE_ICONS = {
    'Arco de Balões':'🎪','Guirlanda de Balões':'✨','Buquê de Balões':'💐',
    'Centro de Mesa':'🌸','Painel de Balões':'🎨','Coluna de Balões':'🎭',

        const coverHtml = (r.photos && r.photos.length)
          ? `<img class="recipe-cover-img" src="${r.photos[0]}" alt="Foto da montagem">`
          : `<div class="recipe-cover-placeholder" style="background:${grad}"><span>${icon}\x3C/span>\x3C/div>`;

              \x3C/div>
            \x3C/div>
          \x3C/div>
          <div class="recipe-card-body">
            <h3 class="recipe-name">${escapeHtml(r.name)}\x3C/h3>
            ${r.themeColors ? `<div class="color-dots">${r.themeColors.split(',').map(c=>`<span class="color-dot" style="background:${escapeHtml(c.trim())}">\x3C/span>`).join('')}\x3C/div>` : ''}

        <input type="file" accept="image/*" multiple style="display:none" onchange="RecipesModule.handlePhotoUpload(event)">

    container.innerHTML = _editPhotos.map((src, i) => `
      <div class="recipe-photo-thumb">

      \x3C/div>`).join('') + addBtnHtml;
  }

  function handlePhotoUpload(event) {
    const files = Array.from(event.target.files);
    const remaining = 3 - _editPhotos.length;
    const toProcess = files.slice(0, remaining);
    let processed = 0;
    toProcess.forEach(file => {
      const reader = new FileReader();
      reader.onload = (e) => {
        _editPhotos.push(e.target.result);
        processed++;
        if (processed === toProcess.length) renderPhotoPreview();
      };
      reader.readAsDataURL(file);
    });
    event.target.value = '';
    if (files.length > remaining) showToast('Máximo de 3 fotos permitido', 'warning');
  }

  function removePhoto(index) {
    _editPhotos.splice(index, 1);
    renderPhotoPreview();
  }

  function attachIngredientListeners() {
    document.querySelectorAll('#ingredients-container .remove-ingredient').forEach(btn => {
      btn.onclick = (e) => { e.target.closest('.ingredient-row').remove(); updateRecipeTotals(); };

    document.querySelectorAll('#ingredients-container .ing-qty, #ingredients-container .ing-cost').forEach(inp => {

  function updateRecipeTotals() {
    let materialCost = 0;
    document.querySelectorAll('#ingredients-container .ingredient-row').forEach(row => {
      const qty = parseFloat(row.querySelector('.ing-qty')?.value) || 0;
      const cost = parseFloat(row.querySelector('.ing-cost')?.value) || 0;
      materialCost += qty * cost;
    });
    const laborHours = parseFloat(document.getElementById('recipe-labor-hours')?.value) || 0;
    const laborRate = parseFloat(document.getElementById('recipe-labor-rate')?.value) || 15;
    const laborCost = laborHours * laborRate;
    const totalCost = materialCost + laborCost;
    const el = document.getElementById('recipe-cost-preview');
    if (el) el.innerHTML = `<span>${I18n.t('pricing.r_materials')}: ${formatCurrency(materialCost)}\x3C/span> <span>${I18n.t('pricing.r_labor')}: ${formatCurrency(laborCost)}\x3C/span> <span class="total-cost">${I18n.t('pricing.r_total_cost')}: ${formatCurrency(totalCost)}\x3C/span>`;
  }

  async function submitForm() {
    const ingredients = [];
    document.querySelectorAll('#ingredients-container .ingredient-row').forEach(row => {
      const name = row.querySelector('.ing-name')?.value.trim();
      if (name) {
        ingredients.push({
          name, size: row.querySelector('.ing-size')?.value.trim(),
          qty: parseFloat(row.querySelector('.ing-qty')?.value) || 0,
          unitCost: parseFloat(row.querySelector('.ing-cost')?.value) || 0
        });
      }
    });
    const data = {
      id: document.getElementById('recipe-id').value || null,
      name: document.getElementById('recipe-name').value.trim(),
      designType: document.getElementById('recipe-type').value,
      themeColors: document.getElementById('recipe-colors').value.trim(),
      laborHours: parseFloat(document.getElementById('recipe-labor-hours').value) || 0,
      laborRate: parseFloat(document.getElementById('recipe-labor-rate').value) || 15,
      setupDuration: document.getElementById('recipe-setup-duration').value.trim(),
      notes: document.getElementById('recipe-notes').value.trim(),
      ingredients,
      photos: [..._editPhotos]
    };
    if (!data.name) { showToast(I18n.t('toast.name_required', { field: I18n.t('recipe.item_name') }), 'error'); return; }
    await save(data);
    closeModal('recipe-modal');
    renderList();
    showToast(data.id ? I18n.t('toast.recipe_updated') : I18n.t('toast.recipe_created'), 'success');

      \x3C/div>` : '';
    document.getElementById('recipe-view-content').innerHTML = `
      <div class="recipe-view-header">
        <div>
          <span class="recipe-type-badge">${escapeHtml(recipe.designType || '')}\x3C/span>
          <h2>${escapeHtml(recipe.name)}\x3C/h2>
          ${recipe.themeColors ? `<div class="color-dots">${recipe.themeColors.split(',').map(c=>`<span class="color-dot" style="background:${escapeHtml(c.trim())}">\x3C/span>`).join('')}\x3C/div>` : ''}
        \x3C/div>
        <button class="btn btn-primary" onclick="closeModal('recipe-view-modal'); RecipesModule.openForm('${id}')">${I18n.t('btn.edit_recipe')}\x3C/button>
      \x3C/div>
      ${photosHtml}
      <div class="stats-row">
        <div class="stat-card"><div class="stat-value">${(recipe.ingredients||[]).length}\x3C/div><div class="stat-label">${I18n.t('recipe.materials')}\x3C/div>\x3C/div>
        <div class="stat-card"><div class="stat-value">${recipe.laborHours||0} ${I18n.t('misc.hrs')}\x3C/div><div class="stat-label">${I18n.t('recipe.labor_time')}\x3C/div>\x3C/div>
        <div class="stat-card"><div class="stat-value">${formatCurrency(cost.materialCost)}\x3C/div><div class="stat-label">${I18n.t('recipe.material_cost')}\x3C/div>\x3C/div>

    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px';
    const renderLb = () => {

    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    renderLb();
    document.body.appendChild(overlay);
  }

  return { load, save, remove, getAll, getById, getFiltered, setSearch, calcRecipeCost, renderList, openForm, submitForm, openView, deleteRecipe, DESIGN_TYPES, updateRecipeTotals, handlePhotoUpload, removePhoto, openPhotoLightbox };
})();

/* ============================================================
   MODULE: Pricing & Profit Engine
   ============================================================ */

const PricingModule = (() => {

  function calculate(inputs) {
    const { materialCost = 0, laborHours = 0, laborRate = 0, deliveryMiles = 0, mileageRate = 0.67, rentalCosts = 0, overheadPercent = 15, desiredMargin = 40 } = inputs;
    const laborCost = laborHours * laborRate;
    const travelCost = deliveryMiles * mileageRate;
    const overhead = ((materialCost + laborCost + travelCost + rentalCosts) * overheadPercent) / 100;
    const totalCost = materialCost + laborCost + travelCost + rentalCosts + overhead;
    const recommendedPrice = desiredMargin < 100 ? totalCost / (1 - desiredMargin / 100) : totalCost * 2;
    const actualMargin = recommendedPrice > 0 ? ((recommendedPrice - totalCost) / recommendedPrice) * 100 : 0;

    return { materialCost, laborCost, travelCost, rentalCosts, overhead, totalCost, recommendedPrice, actualMargin };
  }

  function renderCalculator() {
    const container = document.getElementById('pricing-calculator');
    if (!container) return;
    container.innerHTML = `
      <div class="calculator-grid">
        <div class="calc-inputs">
          <h3>${I18n.t('pricing.cost_inputs')}\x3C/h3>
          <div class="form-group"><label>${I18n.t('pricing.materials')}\x3C/label><input class="form-input" id="pc-materials" type="number" step="0.01" placeholder="0.00" oninput="PricingModule.updateCalc()">\x3C/div>
          <div class="form-group"><label>${I18n.t('pricing.labor_hours')}\x3C/label><input class="form-input" id="pc-labor-hours" type="number" step="0.5" placeholder="0" oninput="PricingModule.updateCalc()">\x3C/div>
          <div class="form-group"><label>${I18n.t('pricing.labor_rate')}\x3C/label><input class="form-input" id="pc-labor-rate" type="number" step="0.01" value="15" oninput="PricingModule.updateCalc()">\x3C/div>
          <div class="form-group"><label>${I18n.t('pricing.delivery_miles')}\x3C/label><input class="form-input" id="pc-miles" type="number" step="1" placeholder="0" oninput="PricingModule.updateCalc()">\x3C/div>
          <div class="form-group"><label>${I18n.t('pricing.mileage_rate')}\x3C/label><input class="form-input" id="pc-mileage-rate" type="number" step="0.01" value="0.67" oninput="PricingModule.updateCalc()">\x3C/div>
          <div class="form-group"><label>${I18n.t('pricing.rental_equipment')}\x3C/label><input class="form-input" id="pc-rentals" type="number" step="0.01" placeholder="0.00" oninput="PricingModule.updateCalc()">\x3C/div>
          <div class="form-group"><label>${I18n.t('pricing.overhead')}\x3C/label><input class="form-input" id="pc-overhead" type="number" step="1" value="15" oninput="PricingModule.updateCalc()">\x3C/div>
          <div class="form-group"><label>${I18n.t('pricing.desired_margin')}\x3C/label><input class="form-input" id="pc-margin" type="number" step="1" value="40" oninput="PricingModule.updateCalc()">\x3C/div>
        \x3C/div>
        <div class="calc-results">
          <h3>${I18n.t('pricing.price_breakdown')}\x3C/h3>
          <div id="calc-result-box">
            <div class="result-row"><span>${I18n.t('pricing.r_materials')}\x3C/span><span id="r-materials">R$ 0,00\x3C/span>\x3C/div>
            <div class="result-row"><span>${I18n.t('pricing.r_labor')}\x3C/span><span id="r-labor">R$ 0,00\x3C/span>\x3C/div>
            <div class="result-row"><span>${I18n.t('pricing.r_travel')}\x3C/span><span id="r-travel">R$ 0,00\x3C/span>\x3C/div>
            <div class="result-row"><span>${I18n.t('pricing.r_rentals')}\x3C/span><span id="r-rentals">R$ 0,00\x3C/span>\x3C/div>
            <div class="result-row"><span>${I18n.t('pricing.r_overhead')}\x3C/span><span id="r-overhead">R$ 0,00\x3C/span>\x3C/div>
            <div class="result-row result-total-cost"><span>${I18n.t('pricing.r_total_cost')}\x3C/span><span id="r-total-cost">R$ 0,00\x3C/span>\x3C/div>
            <div class="result-row result-price"><span>${I18n.t('pricing.r_price')}\x3C/span><span id="r-price">R$ 0,00\x3C/span>\x3C/div>
            <div class="result-row"><span>${I18n.t('pricing.r_profit')}\x3C/span><span id="r-profit">R$ 0,00\x3C/span>\x3C/div>
            <div class="result-row"><span>${I18n.t('pricing.r_margin')}\x3C/span><span id="r-margin">0%\x3C/span>\x3C/div>
          \x3C/div>
          <div class="margin-gauge-container">
            <div class="margin-gauge-label">${I18n.t('pricing.profit_margin')}\x3C/div>
            <div class="margin-gauge-bar"><div class="margin-gauge-fill" id="gauge-fill">\x3C/div>\x3C/div>
            <div class="margin-gauge-value" id="gauge-value">0%\x3C/div>
          \x3C/div>
          <div class="price-suggestions" id="price-suggestions">\x3C/div>
        \x3C/div>
      \x3C/div>`;
    updateCalc();
  }

  function updateCalc() {
    const inputs = {
      materialCost: parseFloat(document.getElementById('pc-materials')?.value) || 0,
      laborHours: parseFloat(document.getElementById('pc-labor-hours')?.value) || 0,
      laborRate: parseFloat(document.getElementById('pc-labor-rate')?.value) || 15,
      deliveryMiles: parseFloat(document.getElementById('pc-miles')?.value) || 0,
      mileageRate: parseFloat(document.getElementById('pc-mileage-rate')?.value) || 0.67,
      rentalCosts: parseFloat(document.getElementById('pc-rentals')?.value) || 0,
      overheadPercent: parseFloat(document.getElementById('pc-overhead')?.value) || 15,
      desiredMargin: parseFloat(document.getElementById('pc-margin')?.value) || 40
    };
    const result = calculate(inputs);

    const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
    set('r-materials', formatCurrency(result.materialCost));
    set('r-labor', formatCurrency(result.laborCost));
    set('r-travel', formatCurrency(result.travelCost));
    set('r-rentals', formatCurrency(result.rentalCosts));
    set('r-overhead', formatCurrency(result.overhead));
    set('r-total-cost', formatCurrency(result.totalCost));
    set('r-price', formatCurrency(result.recommendedPrice));
    set('r-profit', formatCurrency(result.recommendedPrice - result.totalCost));
    set('r-margin', formatPercent(result.actualMargin));

    const gaugeEl = document.getElementById('gauge-fill');
    const gaugeVal = document.getElementById('gauge-value');
    if (gaugeEl) {
      const pct = Math.min(100, Math.max(0, result.actualMargin));
      gaugeEl.style.width = pct + '%';
      gaugeEl.style.background = pct < 20 ? '#EF4444' : pct < 35 ? '#F59E0B' : '#10B981';
    }
    if (gaugeVal) gaugeVal.textContent = formatPercent(result.actualMargin);

    const sugEl = document.getElementById('price-suggestions');
    if (sugEl && result.totalCost > 0) {
      const prices = [
        { label: '30% de margem', price: result.totalCost / 0.7 },
        { label: '40% de margem', price: result.totalCost / 0.6 },
        { label: '50% de margem', price: result.totalCost / 0.5 },
        { label: '60% de margem', price: result.totalCost / 0.4 }
      ];
      sugEl.innerHTML = `<h4>${I18n.t('pricing.price_options')}\x3C/h4><div class="price-chips">${prices.map(p => `<div class="price-chip" onclick="document.getElementById('pc-margin').value=${Math.round(parseFloat(p.label))}; PricingModule.updateCalc();"><div class="chip-label">${p.label}\x3C/div><div class="chip-price">${formatCurrency(p.price)}\x3C/div>\x3C/div>`).join('')}\x3C/div>`;
    }
  }

  return { calculate, renderCalculator, updateCalc };
})();

window.PricingModule = PricingModule;

;

    const record = { ...data, recordType: 'campaign', id: data.id || generateId(), updatedAt: new Date().toISOString() };

    return record;

const MileageModule = (() => {
  let _logs = [];
  let _dateRange = { start: null, end: null };

  const PURPOSES = ['Entrega de Evento','Retirada de Evento','Compra de Insumos','Reunião com Cliente','Reunião com Fornecedor','Outro'];

  async function load() {
    _logs = await DB.getAll('mileage');
    return _logs;
  }

  async function save(data) {
    const record = { ...data, id: data.id || generateId(), updatedAt: new Date().toISOString() };
    if (!record.createdAt) record.createdAt = record.updatedAt;
    await DB.put('mileage', record);
    await load();
    return record;
  }

  async function remove(id) {
    await DB.remove('mileage', id);
    await load();
  }

  function getAll() { return _logs; }

  function getFiltered() {
    let list = [..._logs];
    if (_dateRange.start || _dateRange.end)
      list = filterByDateRange(list, 'date', _dateRange.start, _dateRange.end);
    return sortBy(list, 'date', 'desc');
  }

  function setDateRange(range) { _dateRange = range; }

  function getSummary() {
    const list = getFiltered();
    const totalMiles = sumBy(list, 'miles');
    const rate = 0.67;
    const deduction = totalMiles * rate;
    return { totalMiles, deduction, trips: list.length };
  }

  function renderList() {
    const container = document.getElementById('mileage-list');
    if (!container) return;
    const list = getFiltered();
    const summary = getSummary();

    const statsEl = document.getElementById('mileage-stats');
    if (statsEl) {

        <div class="kpi-card"><div class="kpi-icon">🚗\x3C/div><div class="kpi-value">${summary.trips}\x3C/div><div class="kpi-label">${I18n.t('kpi.trips')}\x3C/div>\x3C/div>

        <tbody>
          ${list.map(log => `<tr>
            <td>${formatDate(log.date)}\x3C/td>

              <button class="btn-icon danger" onclick="MileageModule.deleteLog('${log.id}')">🗑\x3C/button>
            \x3C/td>
          \x3C/tr>`).join('')}
        \x3C/tbody>
      \x3C/table>`;
  }

  async function openForm(id = null) {

  function exportReport() {
    const list = getFiltered();

    _currentRange = range;
    if (range === 'custom') { _customStart = start; _customEnd = end; }
  }

  function destroyChart(key) {
    if (_charts[key]) { try { _charts[key].destroy(); } catch(e) {} delete _charts[key]; }
  }

  async function renderDashboardCharts() {
    const finances = await DB.getAll('finances');
    const events = await DB.getAll('events');
    renderRevenueChart(finances);
    renderEventTypeChart(events);
    renderProfitTrendChart(finances);
  }

  function renderRevenueChart(finances) {
    const ctx = document.getElementById('revenue-chart');
    if (!ctx) return;
    destroyChart('revenue');
    const monthly = FinancesModule.getMonthlyData(6);
    _charts['revenue'] = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: monthly.map(m => m.label),
        datasets: [
          { label: I18n.t('table.revenue'), data: monthly.map(m => m.income), backgroundColor: 'rgba(245,158,11,0.8)', borderColor: '#F59E0B', borderWidth: 2, borderRadius: 6 },

        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top' }, tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: $${ctx.raw.toFixed(2)}` } } },
        scales: { y: { beginAtZero: true, ticks: { callback: v => '$' + v.toLocaleString() } } }
      }
    });
  }

  function renderProfitTrendChart(finances) {
    const ctx = document.getElementById('profit-trend-chart');
    if (!ctx) return;
    destroyChart('profitTrend');
    const monthly = FinancesModule.getMonthlyData(6);
    _charts['profitTrend'] = new Chart(ctx, {
      type: 'line',
      data: {
        labels: monthly.map(m => m.label),
        datasets: [{
          label: I18n.t('kpi.net_profit'),
          data: monthly.map(m => m.income - m.expenses),
          borderColor: '#10B981', backgroundColor: 'rgba(16,185,129,0.1)',
          borderWidth: 2, fill: true, tension: 0.4,
          pointBackgroundColor: '#10B981', pointRadius: 5
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { tooltip: { callbacks: { label: (ctx) => `Profit: $${ctx.raw.toFixed(2)}` } } },
        scales: { y: { ticks: { callback: v => '$' + v.toLocaleString() } } }
      }
    });
  }

  function renderEventTypeChart(events) {
    const ctx = document.getElementById('event-type-chart');
    if (!ctx) return;
    destroyChart('eventType');
    const grouped = groupBy(events.filter(e => e.eventType), 'eventType');
    const labels = Object.keys(grouped);
    const data = labels.map(l => grouped[l].length);
    _charts['eventType'] = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{ data, backgroundColor: APP_CONFIG.chartColors, borderWidth: 2, borderColor: '#FAF8F5' }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'right' }, tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.raw} events` } } }
      }
    });
  }

  async function renderAnalyticsPage() {
    const range = getRange();
    const finances = await DB.getAll('finances');
    const allEvents = await DB.getAll('events');

    const filteredFinances = (range.start || range.end) ? filterByDateRange(finances, 'date', range.start, range.end) : finances;
    const filteredEvents = (range.start || range.end) ? filterByDateRange(allEvents, 'date', range.start, range.end) : allEvents;

    const income = sumBy(filteredFinances.filter(f => f.type === 'income'), 'amount');
    const expenses = sumBy(filteredFinances.filter(f => f.type === 'expense'), 'amount');
    const profit = income - expenses;
    const margin = income > 0 ? (profit / income) * 100 : 0;

    const kpiEl = document.getElementById('analytics-kpis');
    if (kpiEl) {
      kpiEl.innerHTML = `
        <div class="kpi-card kpi-gold"><div class="kpi-icon">💰\x3C/div><div class="kpi-value">${formatCurrency(income)}\x3C/div><div class="kpi-label">${I18n.t('table.revenue')}\x3C/div>\x3C/div>
        <div class="kpi-card kpi-danger"><div class="kpi-icon">💸\x3C/div><div class="kpi-value">${formatCurrency(expenses)}\x3C/div><div class="kpi-label">${I18n.t('kpi.total_expenses')}\x3C/div>\x3C/div>
        <div class="kpi-card kpi-emerald"><div class="kpi-icon">📈\x3C/div><div class="kpi-value">${formatCurrency(profit)}\x3C/div><div class="kpi-label">${I18n.t('kpi.net_profit')}\x3C/div>\x3C/div>
        <div class="kpi-card"><div class="kpi-icon">📊\x3C/div><div class="kpi-value">${formatPercent(margin)}\x3C/div><div class="kpi-label">${I18n.t('kpi.profit_margin')}\x3C/div>\x3C/div>
        <div class="kpi-card kpi-accent"><div class="kpi-icon">📅\x3C/div><div class="kpi-value">${filteredEvents.length}\x3C/div><div class="kpi-label">${I18n.t('kpi.events')}\x3C/div>\x3C/div>
        <div class="kpi-card"><div class="kpi-icon">✅\x3C/div><div class="kpi-value">${filteredEvents.filter(e=>e.status==='Concluído').length}\x3C/div><div class="kpi-label">${I18n.t('kpi.completed')}\x3C/div>\x3C/div>`;
    }

    // Financial charts respect the date filter; event trend/status charts use ALL events
    // so they always show meaningful data regardless of the selected date range
    renderAnalyticsCharts(filteredFinances, allEvents);
    renderExpenseCategoryTable(filteredFinances);
    renderEventStatusTable(allEvents);
  }

  function renderAnalyticsCharts(finances, allEvents) {
    renderRevenueVsExpenseChart(finances);
    renderExpensePieChart(finances);
    renderEventStatusChart(allEvents);
    renderMonthlyBookingsChart(allEvents);
    renderRevenueByTypeChart(allEvents);
  }

  function renderRevenueVsExpenseChart(finances) {
    const ctx = document.getElementById('analytics-revenue-chart');
    if (!ctx) return;
    destroyChart('analyticsRevenue');
    const monthly = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(); d.setMonth(d.getMonth() - i);
      const y = d.getFullYear(), m = d.getMonth();
      const label = d.toLocaleDateString('pt-BR', { month: 'short', year: '2-digit' });
      const recs = finances.filter(f => { if (!f.date) return false; const p = f.date.split('-'); return parseInt(p[0])===y && parseInt(p[1])-1===m; });
      monthly.push({ label, income: sumBy(recs.filter(f=>f.type==='income'), 'amount'), expenses: sumBy(recs.filter(f=>f.type==='expense'), 'amount') });
    }
    _charts['analyticsRevenue'] = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: monthly.map(m => m.label),
        datasets: [
          { label: I18n.t('table.revenue'), data: monthly.map(m => m.income), backgroundColor: 'rgba(245,158,11,0.8)', borderRadius: 6 },
          { label: I18n.t('kpi.total_expenses'), data: monthly.map(m => m.expenses), backgroundColor: 'rgba(239,68,68,0.6)', borderRadius: 6 },
          { label: I18n.t('kpi.net_profit'), data: monthly.map(m => m.income - m.expenses), backgroundColor: 'rgba(16,185,129,0.7)', borderRadius: 6, type: 'line', tension: 0.4, fill: false, borderColor: '#10B981', borderWidth: 2 }
        ]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } }, scales: { y: { ticks: { callback: v => '$' + v.toLocaleString() } } } }
    });
  }

  function renderExpensePieChart(finances) {
    const ctx = document.getElementById('analytics-expense-chart');
    if (!ctx) return;
    destroyChart('expensePie');
    const expenses = finances.filter(f => f.type === 'expense');
    const grouped = groupBy(expenses, 'category');
    const cats = Object.entries(grouped).map(([cat, items]) => ({ category: cat || 'Sem categoria', total: sumBy(items, 'amount') })).sort((a, b) => b.total - a.total);
    if (!cats.length) return;
    _charts['expensePie'] = new Chart(ctx, {
      type: 'doughnut',
      data: { labels: cats.map(c => c.category), datasets: [{ data: cats.map(c => c.total), backgroundColor: APP_CONFIG.chartColors, borderWidth: 2 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' }, tooltip: { callbacks: { label: ctx => `${ctx.label}: $${ctx.raw.toFixed(2)}` } } } }
    });
  }

  function renderEventStatusChart(events) {
    const ctx = document.getElementById('analytics-event-status-chart');
    if (!ctx) return;
    destroyChart('eventStatus');
    const grouped = groupBy(events.filter(e => e.status), 'status');
    const labels = Object.keys(grouped);
    if (!labels.length) {
      ctx.parentElement.innerHTML = '<div class="empty-state-sm" style="height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--text-muted)"><div style="font-size:2rem">📅\x3C/div><p style="font-size:0.85rem">Sem dados de eventos ainda\x3C/p>\x3C/div>';
      return;
    }
    const statusColors = { 'Consulta':'#3B82F6','Orçado':'#F59E0B','Fechado':'#8B5CF6','Em Andamento':'#EC4899','Concluído':'#10B981','Cancelado':'#6B7280' };
    const colors = labels.map(l => statusColors[l] || APP_CONFIG.chartColors[0]);
    _charts['eventStatus'] = new Chart(ctx, {
      type: 'pie',
      data: { labels, datasets: [{ data: labels.map(l => grouped[l].length), backgroundColor: colors, borderWidth: 2, borderColor: 'var(--surface)' }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { padding: 16, font: { size: 12 } } },
          tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw} event${ctx.raw !== 1 ? 's' : ''}` } }
        }
      }
    });
  }

  function renderMonthlyBookingsChart(events) {
    const ctx = document.getElementById('analytics-bookings-chart');
    if (!ctx) return;
    destroyChart('bookings');
    const monthly = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(); d.setMonth(d.getMonth() - i);
      const y = d.getFullYear(), m = d.getMonth();
      const label = d.toLocaleDateString('pt-BR', { month: 'short', year: '2-digit' });
      const count = events.filter(e => {
        if (!e.date) return false;
        const parts = e.date.split('-');
        return parseInt(parts[0]) === y && parseInt(parts[1]) - 1 === m;
      }).length;
      monthly.push({ label, count });
    }
    _charts['bookings'] = new Chart(ctx, {
      type: 'line',
      data: {
        labels: monthly.map(m => m.label),
        datasets: [{
          label: 'Eventos Fechados',
          data: monthly.map(m => m.count),
          borderColor: '#EC4899',
          backgroundColor: 'rgba(236,72,153,0.12)',
          fill: true,
          tension: 0.4,
          pointRadius: 5,
          pointHoverRadius: 7,
          pointBackgroundColor: '#EC4899',
          pointBorderColor: '#fff',
          pointBorderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: { padding: { right: 0, left: 0 } },
        plugins: {
          legend: { display: true, position: 'top' },
          tooltip: { callbacks: { label: ctx => ` ${ctx.raw} event${ctx.raw !== 1 ? 's' : ''}` } }
        },
        scales: {
          y: { beginAtZero: true, ticks: { stepSize: 1, precision: 0 }, grid: { color: 'rgba(0,0,0,0.05)' } },
          x: { offset: false, grid: { display: false } }
        }
      }
    });
  }

  function renderRevenueByTypeChart(allEvents) {
    const ctx = document.getElementById('analytics-revenue-by-type-chart');
    if (!ctx) return;
    destroyChart('revenueByType');

    const completed = allEvents.filter(e => e.totalAmount > 0 && e.eventType);
    if (!completed.length) {
      ctx.parentElement.innerHTML = '<div style="height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--text-muted)"><div style="font-size:2rem">💵\x3C/div><p style="font-size:0.85rem">Sem dados de receita ainda\x3C/p>\x3C/div>';
      return;
    }

    const grouped = {};
    completed.forEach(e => {
      grouped[e.eventType] = (grouped[e.eventType] || 0) + (e.totalAmount || 0);
    });
    const labels = Object.keys(grouped).sort((a, b) => grouped[b] - grouped[a]);
    const data = labels.map(l => grouped[l]);
    const colors = ['#EC4899','#F59E0B','#10B981','#3B82F6','#8B5CF6','#F97316','#06B6D4','#84CC16'];

    _charts['revenueByType'] = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Revenue ($)',
          data,
          backgroundColor: labels.map((_, i) => colors[i % colors.length] + 'CC'),
          borderColor: labels.map((_, i) => colors[i % colors.length]),
          borderWidth: 2,
          borderRadius: 6
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        layout: { padding: { right: 8 } },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ` $${ctx.raw.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}` } }
        },
        scales: {
          x: { beginAtZero: true, ticks: { callback: v => '$' + v.toLocaleString() }, grid: { color: 'rgba(0,0,0,0.05)' } },
          y: { grid: { display: false }, ticks: { font: { size: 12, weight: '600' } } }
        }
      }
    });
  }

  function renderExpenseCategoryTable(finances) {
    const el = document.getElementById('expense-category-table');
    if (!el) return;
    const expenses = finances.filter(f => f.type === 'expense');
    const grouped = groupBy(expenses, 'category');
    const cats = Object.entries(grouped).map(([cat, items]) => ({ category: cat || 'Sem categoria', total: sumBy(items, 'amount') })).sort((a, b) => b.total - a.total);
    const total = sumBy(cats, 'total');
    el.innerHTML = cats.length ? `
      <table class="data-table">
        <thead><tr><th>${I18n.t('table.category')}\x3C/th><th>${I18n.t('table.amount')}\x3C/th><th>${I18n.t('table.percent')}\x3C/th>\x3C/tr>\x3C/thead>
        <tbody>${cats.map(c => `<tr><td>${escapeHtml(c.category)}\x3C/td><td>${formatCurrency(c.total)}\x3C/td><td>${formatPercent(total>0?(c.total/total)*100:0)}\x3C/td>\x3C/tr>`).join('')}\x3C/tbody>
      \x3C/table>` : `<p class="text-muted">${I18n.t('empty.expenses')}\x3C/p>`;
  }

  function renderEventStatusTable(events) {
    const el = document.getElementById('event-status-table');
    if (!el) return;
    const statuses = APP_CONFIG.eventStatuses;
    el.innerHTML = `
      <table class="data-table">
        <thead><tr><th>${I18n.t('table.status')}\x3C/th><th>${I18n.t('table.count')}\x3C/th><th>${I18n.t('table.revenue')}\x3C/th>\x3C/tr>\x3C/thead>
        <tbody>${statuses.map(s => {
          const evs = events.filter(e => e.status === s);
          const rev = sumBy(evs, 'totalAmount');
          return `<tr><td>${statusBadge(s)}\x3C/td><td>${evs.length}\x3C/td><td>${formatCurrency(rev)}\x3C/td>\x3C/tr>`;
        }).join('')}\x3C/tbody>
      \x3C/table>`;
  }

  return { setRange, getRange, renderDashboardCharts, renderAnalyticsPage };
})();

window.AnalyticsModule = AnalyticsModule;

;

/* ============================================================

   ============================================================ */

const SettingsModule = (() => {
  let _settings = {};

  const DEFAULTS = {
    businessName: 'CRM Personalizados',
    ownerName: '',
    email: '',
    phone: '',
    address: '',
    website: '',
    currency: 'R$',
    laborRate: 15,
    mileageRate: 0.67,
    overheadPercent: 15,
    defaultMargin: 40,
    theme: 'light',
    colorTheme: 'rose',
    backupReminder: true,
    language: 'pt-BR',
    customEventTypes: [],
    appEmoji: '🎈'
  };

  async function load() {
    const stored = await DB.getAll('settings');
    const record = stored.find(r => r.id === 'config') || {};
    _settings = { ...DEFAULTS, ...record };
    applyTheme(_settings.theme);
    applyColorTheme(_settings.colorTheme);
    applyAppEmoji(_settings.appEmoji);
    return _settings;
  }

  async function save(data) {
    const record = { ...DEFAULTS, ..._settings, ...data, id: 'config', updatedAt: new Date().toISOString() };
    await DB.put('settings', record);
    _settings = record;
    applyTheme(_settings.theme);
    applyColorTheme(_settings.colorTheme);
    applyAppEmoji(_settings.appEmoji);
    return record;
  }

  function get(key) { return _settings[key] ?? DEFAULTS[key]; }

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme || 'light');
  }

  function applyColorTheme(colorTheme) {
    if (!colorTheme || colorTheme === 'rose') {
      document.documentElement.removeAttribute('data-color-theme');
    } else {
      document.documentElement.setAttribute('data-color-theme', colorTheme);
    }
  }

  function applyAppEmoji(emoji) {
    const el = document.querySelector('.brand-logo');
    if (el) el.textContent = emoji || '🎈';
  }

  function previewTheme(theme) {
    applyTheme(theme);
  }

  function previewAppEmoji(emoji) {
    applyAppEmoji(emoji);
    document.querySelectorAll('.emoji-option').forEach(el => {
      el.classList.toggle('active', el.dataset.emoji === emoji);
    });
    const label = document.querySelector('.emoji-selected-label span');
    if (label) label.textContent = emoji;
    save({ appEmoji: emoji });
  }

  function previewColorTheme(colorTheme) {
    applyColorTheme(colorTheme);
    document.querySelectorAll('.color-swatch').forEach(el => {
      el.classList.toggle('active', el.dataset.colorTheme === colorTheme);
    });
    const label = document.querySelector('.color-theme-label');
    if (label) label.textContent = colorTheme.charAt(0).toUpperCase() + colorTheme.slice(1);
    save({ colorTheme });
  }

  async function addCustomEventType() {
    const input = document.getElementById('s-new-event-type');
    const type = (input?.value || '').trim();
    if (!type) return;
    if (APP_CONFIG.eventTypes.includes(type)) {
      showToast('Esse tipo já existe entre os padrões.', 'error'); return;
    }
    const current = _settings.customEventTypes || [];
    if (current.map(t => t.toLowerCase()).includes(type.toLowerCase())) {
      showToast('Esse tipo personalizado já existe.', 'error'); return;
    }
    await save({ customEventTypes: [...current, type] });
    if (input) input.value = '';
    _renderCustomTypesList();
    showToast(`"${type}" adicionado.`, 'success');
  }

  async function removeCustomEventType(type) {
    const updated = (_settings.customEventTypes || []).filter(t => t !== type);
    await save({ customEventTypes: updated });
    _renderCustomTypesList();
    showToast('Tipo de evento removido.', 'success');
  }

  function _renderCustomTypesList() {
    const container = document.getElementById('s-custom-event-types-list');
    if (!container) return;
    const types = _settings.customEventTypes || [];
    if (!types.length) {
      container.innerHTML = `<p class="text-muted" style="margin-top:8px">Nenhum tipo personalizado cadastrado ainda.\x3C/p>`;
      return;
    }
    container.innerHTML = `<div class="custom-types-chips">${
      types.map(t => `<div class="custom-type-chip"><span>${escapeHtml(t)}\x3C/span><button type="button" class="chip-remove" data-type="${escapeHtml(t)}" onclick="SettingsModule.removeCustomEventType(this.dataset.type)" title="Remover">×\x3C/button>\x3C/div>`).join('')
    }\x3C/div>`;
  }

  function _themeRadioListHtml() {
    const palettes = (window.ThemeManager && window.ThemeManager.palettes) || [];
    const current  = (window.ThemeManager && window.ThemeManager.get()) || 'rosa';
    return `<div class="theme-radio-list" id="s-theme-radio-list">
      ${palettes.map(p => `
        <label class="theme-radio-card ${current === p.id ? 'is-active' : ''}" data-palette-id="${p.id}">
          <input type="radio" name="s-palette" value="${p.id}" ${current === p.id ? 'checked' : ''}>
          <span class="theme-swatch" style="background:${p.color}">\x3C/span>
          <span class="theme-name">${p.label}\x3C/span>
          <span class="theme-check" aria-hidden="true">✓\x3C/span>
        \x3C/label>
      `).join('')}
    \x3C/div>`;
  }

  function renderPage() {

      : `<p class="text-muted" style="margin-top:8px">Nenhum tipo personalizado cadastrado ainda.\x3C/p>`;
    container.innerHTML = `
      <div class="settings-grid">
        <div class="settings-card">
          <h3>${I18n.t('settings.business_info')}\x3C/h3>
          <div class="form-group"><label>${I18n.t('settings.business_name')}\x3C/label><input class="form-input" id="s-business-name" value="${escapeHtml(s.businessName||'')}">\x3C/div>
          <div class="form-group"><label>${I18n.t('settings.owner_name')}\x3C/label><input class="form-input" id="s-owner-name" value="${escapeHtml(s.ownerName||'')}">\x3C/div>
          <div class="form-group"><label>${I18n.t('settings.email')}\x3C/label><input class="form-input" type="email" id="s-email" value="${escapeHtml(s.email||'')}">\x3C/div>
          <div class="form-group"><label>${I18n.t('settings.phone')}\x3C/label><input class="form-input" id="s-phone" value="${escapeHtml(s.phone||'')}">\x3C/div>
          <div class="form-group"><label>${I18n.t('settings.address')}\x3C/label><textarea class="form-input" id="s-address" rows="2">${escapeHtml(s.address||'')}\x3C/textarea>\x3C/div>
          <div class="form-group"><label>${I18n.t('settings.website')}\x3C/label><input class="form-input" id="s-website" value="${escapeHtml(s.website||'')}">\x3C/div>
        \x3C/div>
        <div class="settings-card">
          <h3>${I18n.t('settings.defaults')}\x3C/h3>
          <div class="form-group"><label>${I18n.t('settings.default_labor')}\x3C/label><input class="form-input" type="number" id="s-labor-rate" value="${s.laborRate||15}">\x3C/div>
          <div class="form-group"><label>${I18n.t('settings.mileage_rate')}\x3C/label><input class="form-input" type="number" id="s-mileage-rate" step="0.01" value="${s.mileageRate||0.67}">\x3C/div>
          <div class="form-group"><label>${I18n.t('settings.overhead')}\x3C/label><input class="form-input" type="number" id="s-overhead" value="${s.overheadPercent||15}">\x3C/div>

        \x3C/div>
        <div class="settings-card">

          <div class="form-group"><label>${I18n.t('settings.theme')}\x3C/label>
            <select class="form-input" id="s-theme" onchange="SettingsModule.previewTheme(this.value)">
              <option value="light" ${s.theme==='light'?'selected':''}>${I18n.t('settings.theme_light')}\x3C/option>
              <option value="dark" ${s.theme==='dark'?'selected':''}>${I18n.t('settings.theme_dark')}\x3C/option>
            \x3C/select>
          \x3C/div>
          <div class="form-group">
            <label>Emoji do aplicativo\x3C/label>
            <div class="emoji-picker-grid">
              ${[
                '🎈','🎉','🎊','🎀','🎁','🎂','🥳','🎆','🎇',
                '💐','🌸','🌺','🌻','🌹','🌷','🌼',
                '✨','🌟','💫','⭐','🌈','🦋',

async function updateDashboardStats() {
  const [clients, events, inventory, rentals, finances, employees, mileage] = await Promise.all([
    DB.getAll('clients'), DB.getAll('events'), DB.getAll('inventory'),
    DB.getAll('rentals'), DB.getAll('finances'), DB.getAll('employees'), DB.getAll('mileage')
  ]);

  const now = new Date();
  const thisMonthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
  const todayStr = now.toISOString().slice(0,10);

  const monthFinances = finances.filter(f => f.date >= thisMonthStart);
  const monthIncome = sumBy(monthFinances.filter(f => f.type === 'income'), 'amount');
  const monthExpenses = sumBy(monthFinances.filter(f => f.type === 'expense'), 'amount');
  const monthProfit = monthIncome - monthExpenses;

  const totalIncome = sumBy(finances.filter(f => f.type === 'income'), 'amount');
  const totalExpenses = sumBy(finances.filter(f => f.type === 'expense'), 'amount');
  const netProfit = totalIncome - totalExpenses;

  const upcoming = events.filter(e => { const d = new Date(e.date); return d >= now && e.status !== 'Cancelado' && e.status !== 'Concluído'; });
  const openQuotes = events.filter(e => e.status === 'Consulta' || e.status === 'Orçado');
  const inventoryValue = sumBy(inventory, item => (item.quantity||0)*(item.unitCost||0));

  const rentalItems = rentals.filter(r => r.recordType === 'item');
  const activeRentals = rentals.filter(r => r.recordType === 'rental' && r.status === 'Out');
  const utilization = rentalItems.length > 0 ? Math.round((new Set(activeRentals.map(r => r.itemId)).size / rentalItems.length) * 100) : 0;

  const laborEmployees = employees.filter(r => r.recordType === 'employee');
  const timesheets = employees.filter(r => r.recordType === 'timesheet');
  const monthSheets = timesheets.filter(ts => ts.date >= thisMonthStart);
  const laborCost = sumBy(monthSheets, ts => {
    const emp = laborEmployees.find(e => e.id === ts.employeeId);
    return (ts.hours||0) * (emp?.hourlyRate||0);
  });

  const setKPI = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };

  setKPI('kpi-total-revenue', formatCurrency(totalIncome));
  setKPI('kpi-net-profit', formatCurrency(netProfit));
  setKPI('kpi-total-expenses', formatCurrency(totalExpenses));
  setKPI('kpi-upcoming-events', upcoming.length);
  setKPI('kpi-active-clients', clients.length);
  setKPI('kpi-open-quotes', openQuotes.length);
  setKPI('kpi-inventory-value', formatCurrency(inventoryValue));
  setKPI('kpi-rental-utilization', utilization + '%');
  setKPI('kpi-labor-cost', formatCurrency(laborCost));
  setKPI('kpi-month-revenue', formatCurrency(monthIncome));
  setKPI('kpi-month-profit', formatCurrency(monthProfit));

  const profitMargin = totalIncome > 0 ? (netProfit / totalIncome) * 100 : 0;
  setKPI('kpi-profit-margin', formatPercent(profitMargin));

  renderUpcomingEvents(upcoming);
  renderAlerts(events, inventory, rentals);
}

function renderUpcomingEvents(upcoming) {
  const container = document.getElementById('upcoming-events');
  if (!container) return;
  const list = upcoming.slice(0, 8);
  if (!list.length) {
    container.innerHTML = `<div class="empty-state-sm"><p>${I18n.t('empty.upcoming')}\x3C/p>\x3C/div>`;
    return;
  }
  container.innerHTML = list.map(ev => `
    <div class="upcoming-event-item">
      <div class="event-dot" style="background:${eventStatusColor(ev.status)}">\x3C/div>
      <div class="event-details">
        <strong>${escapeHtml(ev.name)}\x3C/strong>
        <span class="text-muted">${escapeHtml(ev.clientName || '')}\x3C/span>
      \x3C/div>
      <div class="event-right">
        <span class="event-date">${formatDateShort(ev.date)}\x3C/span>
        ${statusBadge(ev.status)}
      \x3C/div>
    \x3C/div>`).join('');
}

function eventStatusColor(status) {
  const map = { 'Consulta':'#3B82F6','Orçado':'#F59E0B','Fechado':'#8B5CF6','Em Andamento':'#EC4899','Concluído':'#10B981','Cancelado':'#6B7280' };
  return map[status] || '#6B7280';
}

function renderAlerts(events, inventory, rentals) {
  const container = document.getElementById('alerts-container');
  if (!container) return;

  const alerts = [];
  const now = new Date();

  // Upcoming events this week
  const weekEnd = new Date(); weekEnd.setDate(weekEnd.getDate() + 7);
  const thisWeek = events.filter(e => { const d = new Date(e.date); return d >= now && d <= weekEnd && e.status !== 'Cancelado'; });
  if (thisWeek.length) alerts.push({ type: 'info', icon: '📅', msg: I18n.t(thisWeek.length > 1 ? 'alert.events_week_plural' : 'alert.events_week', { count: thisWeek.length }) });

  // Low inventory
  const lowItems = inventory.filter(i => (i.quantity||0) <= (i.reorderPoint||10) && (i.quantity||0) > 0);
  if (lowItems.length) alerts.push({ type: 'warning', icon: '📦', msg: I18n.t(lowItems.length > 1 ? 'alert.low_stock_plural' : 'alert.low_stock', { count: lowItems.length }) });

  // Out of stock
  const outItems = inventory.filter(i => (i.quantity||0) === 0);
  if (outItems.length) alerts.push({ type: 'danger', icon: '🚨', msg: I18n.t(outItems.length > 1 ? 'alert.out_of_stock_plural' : 'alert.out_of_stock', { count: outItems.length }) });

  // Overdue rentals
  const overdueRentals = rentals.filter(r => r.recordType === 'rental' && r.status === 'Out' && new Date(r.returnDate) < now);
  if (overdueRentals.length) alerts.push({ type: 'danger', icon: '⚠️', msg: I18n.t(overdueRentals.length > 1 ? 'alert.overdue_plural' : 'alert.overdue', { count: overdueRentals.length }) });

  // Unconverted quotes older than 7 days
  const staleQuotes = events.filter(e => {
    if (e.status !== 'Consulta' && e.status !== 'Orçado') return false;
    const created = new Date(e.createdAt);
    return (now - created) > 7 * 86400000;
  });
  if (staleQuotes.length) alerts.push({ type: 'warning', icon: '💬', msg: I18n.t(staleQuotes.length > 1 ? 'alert.stale_quotes_plural' : 'alert.stale_quotes', { count: staleQuotes.length }) });

  if (!alerts.length) {
    container.innerHTML = `<div class="alert alert-success"><span>✅\x3C/span> ${I18n.t('alert.all_good').replace('✅ ','')}\x3C/div>`;
    return;
  }
  container.innerHTML = alerts.map(a => `<div class="alert alert-${a.type}"><span>${a.icon}\x3C/span> ${escapeHtml(a.msg)}\x3C/div>`).join('');
}

window.updateDashboardStats = updateDashboardStats;
window.renderUpcomingEvents = renderUpcomingEvents;
window.renderAlerts = renderAlerts;

/* ===== js/ui/daterangepicker.js ===== */
/* ============================================================
   UI: Date Range Picker — QuickBooks-style
   Two-month calendar with preset shortcuts sidebar
   ============================================================ */

const DateRangePicker = (() => {
  const _instances = {};
  let _hoverRaf = null;

  /* ── Presets ── */
  const PRESETS = [
    { key: 'today',        label: 'Hoje' },
    { key: 'yesterday',    label: 'Ontem' },
    { key: 'thisWeek',     label: 'Esta semana' },
    { key: 'last7',        label: 'Últimos 7 dias' },
    { key: 'thisMonth',    label: 'Este mês' },
    { key: 'last30',       label: 'Últimos 30 dias' },
    { key: 'thisQuarter',  label: 'Este trimestre' },
    { key: 'lastQuarter',  label: 'Último trimestre' },
    { key: 'last90',       label: 'Últimos 90 dias' },
    { key: 'thisYear',     label: 'Este ano' },
    { key: 'lastYear',     label: 'Ano passado' },
    { key: 'all',          label: 'Todo o período' },
  ];

  function _iso(d) { return d.toISOString().slice(0, 10); }
  function _pad(n) { return String(n).padStart(2, '0'); }

  function resolvePreset(key) {
    const now = new Date();
    const today = _iso(now);
    switch (key) {
      case 'today':
        return { start: today, end: today };
      case 'yesterday': {
        const d = new Date(now); d.setDate(d.getDate() - 1);
        return { start: _iso(d), end: _iso(d) };
      }
      case 'thisWeek': {
        const d = new Date(now); d.setDate(now.getDate() - now.getDay());
        return { start: _iso(d), end: today };
      }
      case 'last7': {
        const s = new Date(now); s.setDate(s.getDate() - 6);
        return { start: _iso(s), end: today };
      }
      case 'thisMonth': {
        const s = new Date(now.getFullYear(), now.getMonth(), 1);
        return { start: _iso(s), end: today };
      }
      case 'thisQuarter': {
        const q = Math.floor(now.getMonth() / 3);
        const s = new Date(now.getFullYear(), q * 3, 1);
        return { start: _iso(s), end: today };
      }
      case 'lastQuarter': {
        const q = Math.floor(now.getMonth() / 3);
        const s = new Date(now.getFullYear(), (q - 1) * 3, 1);
        const e = new Date(now.getFullYear(), q * 3, 0);
        return { start: _iso(s), end: _iso(e) };
      }
      case 'last30': {
        const s = new Date(now); s.setDate(s.getDate() - 29);
        return { start: _iso(s), end: today };
      }
      case 'last90': {
        const s = new Date(now); s.setDate(s.getDate() - 89);
        return { start: _iso(s), end: today };
      }
      case 'thisYear':
        return { start: `${now.getFullYear()}-01-01`, end: today };
      case 'lastYear': {
        const y = now.getFullYear() - 1;
        return { start: `${y}-01-01`, end: `${y}-12-31` };
      }
      case 'all':
      default:
        return { start: null, end: null };
    }
  }

  function _fmtDate(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-');
    return new Date(+y, +m - 1, +d).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function _labelFor(inst) {
    const p = PRESETS.find(x => x.key === inst.appliedPreset);
    if (p && p.key !== 'all') return p.label;
    if (!inst.appliedStart && !inst.appliedEnd) return 'Todo o período';
    if (inst.appliedStart && inst.appliedEnd)
      return `${_fmtDate(inst.appliedStart)} – ${_fmtDate(inst.appliedEnd)}`;
    if (inst.appliedStart) return `A partir de ${_fmtDate(inst.appliedStart)}`;
    return `Até ${_fmtDate(inst.appliedEnd)}`;
  }

  /* ── Public: create ── */
  function create(anchorId, options = {}) {
    const { defaultPreset = 'all', onChange } = options;
    const res = resolvePreset(defaultPreset);
    const now = new Date();

    const inst = {
      anchorId,
      onChange,
      /* applied = confirmed selection */
      appliedPreset: defaultPreset,
      appliedStart:  res.start,
      appliedEnd:    res.end,
      /* pending = in-progress selection inside the open panel */
      pendingPreset: defaultPreset,
      pendingStart:  res.start,
      pendingEnd:    res.end,
      /* calendar view state */
      leftMonth: new Date(now.getFullYear(), now.getMonth() - 1, 1),
      selecting: false,
      hoverDate: null,
      panelId: `drp-panel-${anchorId}`,
    };
    _instances[anchorId] = inst;

    const anchor = document.getElementById(anchorId);
    if (!anchor) return inst;

    anchor.innerHTML = `
      <button class="drp-trigger" id="drp-btn-${anchorId}"
        onclick="DateRangePicker._toggle('${anchorId}')">
        <span class="drp-trigger-icon">📅\x3C/span>
        <span class="drp-trigger-label" id="drp-label-${anchorId}">${_labelFor(inst)}\x3C/span>
        <span class="drp-trigger-caret">▾\x3C/span>
      \x3C/button>`;

    const panel = document.createElement('div');
    panel.id = inst.panelId;
    panel.className = 'drp-panel';
    panel.style.display = 'none';
    document.body.appendChild(panel);

    return inst;
  }

  /* ── Panel rendering ── */
  function _renderPanel(inst) {
    const panel = document.getElementById(inst.panelId);
    if (!panel) return;

    const rightMonth = new Date(inst.leftMonth.getFullYear(), inst.leftMonth.getMonth() + 1, 1);
    const today = new Date().toISOString().slice(0, 10);

    const pStart = inst.pendingStart;
    const pEnd   = inst.pendingEnd || (inst.selecting ? inst.hoverDate : null);
    const rMin   = pStart && pEnd ? (pStart <= pEnd ? pStart : pEnd) : pStart;
    const rMax   = pStart && pEnd ? (pStart <= pEnd ? pEnd : pStart) : null;

    const hintHtml = pStart
      ? `<span class="drp-chip">${_fmtDate(pStart)}\x3C/span>
         <span class="drp-chip-arrow">→\x3C/span>
         <span class="drp-chip ${inst.selecting ? 'drp-chip-pending' : ''}">${pEnd ? _fmtDate(pEnd) : (inst.selecting ? '...' : '')}\x3C/span>`
      : `<span class="drp-hint">Clique em uma data inicial\x3C/span>`;

    panel.innerHTML = `
      <div class="drp-inner">
        <div class="drp-sidebar">
          ${PRESETS.map(p => `
            <button class="drp-preset-btn${inst.pendingPreset === p.key ? ' active' : ''}"
              onclick="DateRangePicker._pickPreset('${inst.anchorId}','${p.key}')">
              ${escapeHtml(p.label)}
            \x3C/button>`).join('')}
        \x3C/div>
        <div class="drp-main">
          <div class="drp-cals-row"
            onmouseleave="DateRangePicker._hoverLeave('${inst.anchorId}')">
            ${_calHtml(inst, inst.leftMonth, 'left',  rMin, rMax, today)}
            <div class="drp-cal-sep">\x3C/div>
            ${_calHtml(inst, rightMonth,     'right', rMin, rMax, today)}
          \x3C/div>
          <div class="drp-footer">
            <div class="drp-footer-range">${hintHtml}\x3C/div>
            <div class="drp-footer-actions">
              <button class="btn btn-ghost btn-sm"
                onclick="DateRangePicker._cancel('${inst.anchorId}')">Cancelar\x3C/button>
              <button class="btn btn-primary btn-sm"
                onclick="DateRangePicker._apply('${inst.anchorId}')">Aplicar\x3C/button>
            \x3C/div>
          \x3C/div>
        \x3C/div>
      \x3C/div>`;
  }

  function _calHtml(inst, monthDate, side, rMin, rMax, today) {
    const y = monthDate.getFullYear();
    const m = monthDate.getMonth();
    const firstDow  = new Date(y, m, 1).getDay();
    const lastDay   = new Date(y, m + 1, 0).getDate();
    const monthLabel = monthDate.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });

    const navLeft  = side === 'left'
      ? `<button class="drp-nav" onclick="DateRangePicker._navMonth('${inst.anchorId}',-1)">‹\x3C/button>`
      : `<span class="drp-nav-placeholder">\x3C/span>`;
    const navRight = side === 'right'
      ? `<button class="drp-nav" onclick="DateRangePicker._navMonth('${inst.anchorId}',1)">›\x3C/button>`
      : `<span class="drp-nav-placeholder">\x3C/span>`;

    let cells = Array(firstDow).fill('<span class="drp-cell drp-cell-empty">\x3C/span>').join('');

    for (let d = 1; d <= lastDay; d++) {
      const ds = `${y}-${_pad(m + 1)}-${_pad(d)}`;
      const isStart    = ds === inst.pendingStart;
      const isEnd      = ds === inst.pendingEnd;
      const isHover    = inst.selecting && ds === inst.hoverDate;
      const isRangeMin = ds === rMin;
      const isRangeMax = ds === rMax;
      const inRange    = rMin && rMax && ds > rMin && ds < rMax;
      const isToday    = ds === today;
      const selected   = isStart || isEnd || isHover || isRangeMin || isRangeMax;

      let cls = 'drp-cell';
      if (selected)   cls += ' drp-selected';
      if (isRangeMin) cls += ' drp-range-start';
      if (isRangeMax) cls += ' drp-range-end';
      if (isRangeMin && isRangeMax) cls += ' drp-range-single';
      if (inRange)    cls += ' drp-in-range';
      if (isToday)    cls += ' drp-today';

      cells += `<span class="${cls}" data-date="${ds}"
        onclick="DateRangePicker._clickDay('${inst.anchorId}','${ds}')"
        onmouseenter="DateRangePicker._hoverDay('${inst.anchorId}','${ds}')"
        ><span class="drp-day-num">${d}\x3C/span>\x3C/span>`;
    }

    return `
      <div class="drp-cal">
        <div class="drp-cal-head">
          ${navLeft}
          <span class="drp-cal-title">${escapeHtml(monthLabel)}\x3C/span>
          ${navRight}
        \x3C/div>
        <div class="drp-cal-grid">
          <span class="drp-dow">Dom\x3C/span><span class="drp-dow">Seg\x3C/span>
          <span class="drp-dow">Ter\x3C/span><span class="drp-dow">Qua\x3C/span>
          <span class="drp-dow">Qui\x3C/span><span class="drp-dow">Sex\x3C/span>
          <span class="drp-dow">Sáb\x3C/span>
          ${cells}
        \x3C/div>
      \x3C/div>`;
  }

  /* ── Open / Close ── */
  function _toggle(anchorId) {
    const panel = document.getElementById(`drp-panel-${anchorId}`);
    if (panel && panel.style.display !== 'none') _close(anchorId);
    else _open(anchorId);
  }

  function _open(anchorId) {
    Object.keys(_instances).forEach(id => { if (id !== anchorId) _close(id); });

    const inst = _instances[anchorId];
    if (!inst) return;

    /* reset pending to last applied */
    inst.pendingPreset = inst.appliedPreset;
    inst.pendingStart  = inst.appliedStart;
    inst.pendingEnd    = inst.appliedEnd;
    inst.selecting     = false;
    inst.hoverDate     = null;

    _renderPanel(inst);

    const panel = document.getElementById(inst.panelId);
    const btn   = document.getElementById(`drp-btn-${anchorId}`);
    if (!panel || !btn) return;

    panel.style.display = 'block';
    btn.classList.add('drp-open');

    /* position after paint so we have accurate dimensions */
    requestAnimationFrame(() => _positionPanel(anchorId));
  }

  function _close(anchorId) {
    const panel = document.getElementById(`drp-panel-${anchorId}`);
    const btn   = document.getElementById(`drp-btn-${anchorId}`);
    if (panel) panel.style.display = 'none';
    if (btn)   btn.classList.remove('drp-open');
  }

  function _positionPanel(anchorId) {
    const panel = document.getElementById(`drp-panel-${anchorId}`);
    const btn   = document.getElementById(`drp-btn-${anchorId}`);
    if (!panel || !btn) return;

    const br = btn.getBoundingClientRect();
    let top  = br.bottom + 6;
    let left = br.left;

    panel.style.position = 'fixed';
    panel.style.top      = top + 'px';
    panel.style.left     = left + 'px';
    panel.style.zIndex   = '10000';

    /* keep inside viewport */
    const pr = panel.getBoundingClientRect();
    if (pr.right > window.innerWidth - 8)
      panel.style.left = Math.max(8, window.innerWidth - pr.width - 8) + 'px';
    if (pr.bottom > window.innerHeight - 8)
      panel.style.top  = Math.max(8, br.top - pr.height - 6) + 'px';
  }

  /* ── Interactions ── */
  function _cancel(anchorId) { _close(anchorId); }

  function _apply(anchorId) {
    const inst = _instances[anchorId];
    if (!inst) return;
    inst.appliedPreset = inst.pendingPreset;
    inst.appliedStart  = inst.pendingStart;
    inst.appliedEnd    = inst.pendingEnd;
    const el = document.getElementById(`drp-label-${anchorId}`);
    if (el) el.textContent = _labelFor(inst);
    _close(anchorId);
    if (inst.onChange) inst.onChange(inst.appliedPreset, inst.appliedStart, inst.appliedEnd);
  }

  /* Preset click → immediate apply + close */
  function _pickPreset(anchorId, presetKey) {
    const inst = _instances[anchorId];
    if (!inst) return;
    const res = resolvePreset(presetKey);
    inst.pendingPreset = presetKey;
    inst.pendingStart  = res.start;
    inst.pendingEnd    = res.end;
    inst.selecting     = false;
    inst.hoverDate     = null;
    _apply(anchorId);
  }

  /* Month navigation */
  function _navMonth(anchorId, dir) {
    const inst = _instances[anchorId];
    if (!inst) return;
    inst.leftMonth = new Date(inst.leftMonth.getFullYear(), inst.leftMonth.getMonth() + dir, 1);
    _renderPanel(inst);
    requestAnimationFrame(() => _positionPanel(anchorId));
  }

  /* Day click — first click = start, second click = end → auto apply */
  function _clickDay(anchorId, ds) {
    const inst = _instances[anchorId];
    if (!inst) return;
    inst.pendingPreset = 'custom';

    if (!inst.selecting) {
      inst.pendingStart = ds;
      inst.pendingEnd   = null;
      inst.selecting    = true;
      inst.hoverDate    = null;
      _renderPanel(inst);
      requestAnimationFrame(() => _positionPanel(anchorId));
    } else {
      /* second click — normalise order */
      if (ds < inst.pendingStart) {
        inst.pendingEnd   = inst.pendingStart;
        inst.pendingStart = ds;
      } else {
        inst.pendingEnd = ds;
      }
      inst.selecting = false;
      inst.hoverDate = null;
      _apply(anchorId);
    }
  }

  /* Hover preview while selecting */
  function _hoverDay(anchorId, ds) {
    const inst = _instances[anchorId];
    if (!inst || !inst.selecting || !inst.pendingStart) return;
    if (inst.hoverDate === ds) return;
    inst.hoverDate = ds;
    if (_hoverRaf) cancelAnimationFrame(_hoverRaf);
    _hoverRaf = requestAnimationFrame(() => {
      _renderPanel(inst);
      _hoverRaf = null;
    });
  }

  function _hoverLeave(anchorId) {
    const inst = _instances[anchorId];
    if (!inst || !inst.selecting || !inst.hoverDate) return;
    inst.hoverDate = null;
    _renderPanel(inst);
  }

  /* Close on outside click */
  document.addEventListener('click', e => {
    Object.keys(_instances).forEach(id => {
      const panel = document.getElementById(`drp-panel-${id}`);
      const btn   = document.getElementById(`drp-btn-${id}`);
      if (panel && panel.style.display !== 'none'
          && !panel.contains(e.target) && !btn?.contains(e.target)) {
        _close(id);
      }
    });
  }, true);

  return {
    create,
    _toggle, _open, _close, _cancel, _apply,
    _pickPreset, _navMonth, _clickDay, _hoverDay, _hoverLeave,
  };
})();

window.DateRangePicker = DateRangePicker;

/* ===== js/ui/calendar.js ===== */
/* ============================================================
   UI: Calendar Module
   ============================================================ */

const CalendarModule = (() => {
  let _currentDate = new Date();
  let _view = 'month'; // month | week

  function render() {
    const container = document.getElementById('calendar-container');
    if (!container) return;
    if (_view === 'month') renderMonth(container);
    else renderWeek(container);
  }

  async function renderMonth(container) {
    const events = await DB.getAll('events');
    const year = _currentDate.getFullYear();
    const month = _currentDate.getMonth();

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date().toISOString().slice(0, 10);

    const statusColors = {
      'Consulta': '#3B82F6', 'Orçado': '#F59E0B', 'Fechado': '#8B5CF6',
      'Em Andamento': '#EC4899', 'Concluído': '#10B981', 'Cancelado': '#6B7280'
    };

    const monthName = _currentDate.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
    let html = `
      <div class="calendar-header">
        <button class="btn-icon" onclick="CalendarModule.prev()">‹\x3C/button>
        <h3>${monthName}\x3C/h3>
        <button class="btn-icon" onclick="CalendarModule.next()">›\x3C/button>
        <div class="calendar-view-toggle">
          <button class="btn btn-sm ${_view==='month'?'btn-primary':'btn-ghost'}" onclick="CalendarModule.setView('month')">${I18n.t('btn.month') || 'Month'}\x3C/button>
          <button class="btn btn-sm ${_view==='week'?'btn-primary':'btn-ghost'}" onclick="CalendarModule.setView('week')">${I18n.t('btn.week') || 'Week'}\x3C/button>
        \x3C/div>
      \x3C/div>
      <div class="calendar-grid">
        <div class="cal-day-header">${I18n.t('cal.sun')}\x3C/div><div class="cal-day-header">${I18n.t('cal.mon')}\x3C/div>
        <div class="cal-day-header">${I18n.t('cal.tue')}\x3C/div><div class="cal-day-header">${I18n.t('cal.wed')}\x3C/div>
        <div class="cal-day-header">${I18n.t('cal.thu')}\x3C/div><div class="cal-day-header">${I18n.t('cal.fri')}\x3C/div>
        <div class="cal-day-header">${I18n.t('cal.sat')}\x3C/div>`;

    for (let i = 0; i < firstDay; i++) html += `<div class="cal-cell cal-empty">\x3C/div>`;

    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const dayEvents = events.filter(e => e.date && e.date.slice(0,10) === dateStr);
      const isToday = dateStr === today;
      html += `<div class="cal-cell ${isToday ? 'cal-today' : ''}">
        <div class="cal-day-num">${day}\x3C/div>
        <div class="cal-events">
          ${dayEvents.slice(0, 3).map(ev => `
            <div class="cal-event" style="background:${statusColors[ev.status]||'#6B7280'}" title="${escapeHtml(ev.name)} - ${escapeHtml(ev.status)}" onclick="EventsModule.openForm('${ev.id}')">
              ${escapeHtml(ev.name.slice(0,18))}${ev.name.length>18?'…':''}
            \x3C/div>`).join('')}
          ${dayEvents.length > 3 ? `<div class="cal-more">+${dayEvents.length-3} more\x3C/div>` : ''}
        \x3C/div>
      \x3C/div>`;
    }
    html += '\x3C/div>';
    const legendColors = Object.entries(statusColors);
    html += `<div class="calendar-legend">${legendColors.map(([s,c]) => `<span class="legend-item"><span class="legend-dot" style="background:${c}">\x3C/span>${I18n.translateStatus(s)}\x3C/span>`).join('')}\x3C/div>`;
    container.innerHTML = html;
  }

  async function renderWeek(container) {
    const events = await DB.getAll('events');
    const startOfWeek = new Date(_currentDate);
    startOfWeek.setDate(_currentDate.getDate() - _currentDate.getDay());

    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(startOfWeek);
      d.setDate(d.getDate() + i);
      days.push(d);
    }

    const weekLabel = `${days[0].toLocaleDateString('pt-BR',{day:'numeric',month:'short'})} – ${days[6].toLocaleDateString('pt-BR',{day:'numeric',month:'short',year:'numeric'})}`;
    const statusColors = { 'Consulta':'#3B82F6','Orçado':'#F59E0B','Fechado':'#8B5CF6','Em Andamento':'#EC4899','Concluído':'#10B981','Cancelado':'#6B7280' };
    const today = new Date().toISOString().slice(0,10);

    let html = `
      <div class="calendar-header">
        <button class="btn-icon" onclick="CalendarModule.prev()">‹\x3C/button>
        <h3>${weekLabel}\x3C/h3>
        <button class="btn-icon" onclick="CalendarModule.next()">›\x3C/button>
        <div class="calendar-view-toggle">
          <button class="btn btn-sm btn-ghost" onclick="CalendarModule.setView('month')">${I18n.t('btn.month') || 'Month'}\x3C/button>
          <button class="btn btn-sm btn-primary" onclick="CalendarModule.setView('week')">${I18n.t('btn.week') || 'Week'}\x3C/button>
        \x3C/div>
      \x3C/div>
      <div class="week-grid">
        ${days.map(d => {
          const dateStr = d.toISOString().slice(0,10);
          const dayEvents = events.filter(e => e.date && e.date.slice(0,10) === dateStr);
          const isToday = dateStr === today;
          return `<div class="week-col ${isToday?'week-today':''}">
            <div class="week-day-label">${d.toLocaleDateString('pt-BR',{weekday:'short'})}<br><strong>${d.getDate()}\x3C/strong>\x3C/div>
            <div class="week-events">
              ${dayEvents.map(ev => `<div class="week-event" style="background:${statusColors[ev.status]||'#6B7280'}" onclick="EventsModule.openForm('${ev.id}')">
                <strong>${escapeHtml(ev.name)}\x3C/strong>
                ${ev.setupTime ? `<span>${escapeHtml(ev.setupTime)}\x3C/span>` : ''}
              \x3C/div>`).join('')}
              ${!dayEvents.length ? `<div class="week-empty">—\x3C/div>` : ''}
            \x3C/div>
          \x3C/div>`;
        }).join('')}
      \x3C/div>`;
    container.innerHTML = html;
  }

  function prev() {
    if (_view === 'month') _currentDate.setMonth(_currentDate.getMonth() - 1);
    else _currentDate.setDate(_currentDate.getDate() - 7);
    render();
  }

  function next() {
    if (_view === 'month') _currentDate.setMonth(_currentDate.getMonth() + 1);
    else _currentDate.setDate(_currentDate.getDate() + 7);
    render();
  }

  function setView(v) { _view = v; render(); }

  return { render, prev, next, setView };
})();

/* ============================================================
   INVOICE MODULE — PDF-ready invoice generator
   Uses window.open() + print() for clean PDF output
   Labels are resolved via I18n.t() at print time so the
   invoice matches the app's active language.
   ============================================================ */

const InvoiceModule = (() => {
  let _data = null;

  async function open(clientId, filterEventId = null) {
    const client = ClientsModule.getById(clientId);
    if (!client) return;

    const allEvents = await DB.getAll('events');
    const events = allEvents
      .filter(e => e.clientId === clientId)
      .filter(e => filterEventId ? e.id === filterEventId : true)
      .sort((a, b) => (a.date || '').localeCompare(b.date || ''));

    _data = {
      invoiceNumber: _generateNumber(),
      invoiceDate: new Date().toISOString().slice(0, 10),
      dueDate: new Date(Date.now() + 14 * 86400000).toISOString().slice(0, 10),
      client,
      events,
      biz: {
        name:    SettingsModule.get('businessName') || 'CRM Personalizados',
        owner:   SettingsModule.get('ownerName')    || '',
        email:   SettingsModule.get('email')        || '',
        phone:   SettingsModule.get('phone')        || '',
        address: SettingsModule.get('address')      || '',
        website: SettingsModule.get('website')      || '',
      }
    };

    _renderModal();
    const docName = _generateDocName(client, events, I18n.getCurrentLang());
    const modalTitle = document.querySelector('#invoice-modal .modal-header h3');
    if (modalTitle) modalTitle.textContent = docName;
    document.getElementById('invoice-modal').classList.add('active');
  }

  function _generateNumber() {
    const d = new Date();
    const ymd = `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}`;
    return `INV-${ymd}-${String(Math.floor(Math.random() * 9000) + 1000)}`;
  }

  function _slugify(str) {
    return String(str || '')
      .trim()
      .replace(/[^\w\s-]/g, '')
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '');
  }

  function _generateDocName(client, events, lang) {
    const clientSlug = _slugify(client.name);
    const date = events.length
      ? (events[0].date || new Date().toISOString().slice(0, 10))
      : new Date().toISOString().slice(0, 10);
    const eventSlug = events.length === 1
      ? _slugify(events[0].name)
      : events.length > 1
        ? 'Multiple-Eventos'
        : 'Fatura';
    const langCode = (lang || 'en').toUpperCase();
    return `${clientSlug}-${date}-${eventSlug}-${langCode}`;
  }

  function _labels() {
    return {
      title:            I18n.t('invoice.title'),
      number:           I18n.t('invoice.number'),
      date:             I18n.t('invoice.date'),
      dueDate:          I18n.t('invoice.due_date'),
      billTo:           I18n.t('invoice.bill_to'),
      description:      I18n.t('table.description'),
      eventDate:        I18n.t('invoice.event_date'),
      status:           I18n.t('table.status'),
      amount:           I18n.t('table.amount'),
      deposit:          I18n.t('form.deposit_received'),
      subtotal:         I18n.t('invoice.subtotal'),
      depositReceived:  I18n.t('invoice.deposit_received'),
      balanceDue:       I18n.t('invoice.balance_due'),
      paymentTerms:     I18n.t('invoice.payment_terms'),
      notes:            I18n.t('form.notes'),
      thankYou:         I18n.t('invoice.thank_you'),
      noItems:          I18n.t('invoice.no_items'),
      defaultTerms:     I18n.t('invoice.default_terms'),
    };
  }

  function _renderModal() {
    const { invoiceNumber, invoiceDate, dueDate, client, events, biz } = _data;
    const L = _labels();
    const subtotal = events.reduce((s, e) => s + (e.totalAmount || 0), 0);

    document.getElementById('invoice-content').innerHTML = `

        <div class="inv-preview-header">
          <div class="inv-preview-biz">

            ${biz.phone   ? `<div>${escapeHtml(biz.phone)}\x3C/div>`   : ''}
            ${biz.email   ? `<div>${escapeHtml(biz.email)}\x3C/div>`   : ''}
            ${biz.website ? `<div>${escapeHtml(biz.website)}\x3C/div>` : ''}

        <hr class="inv-divider">

        <div class="inv-bill-to">
          <div class="inv-label">${L.billTo}\x3C/div>
          <div class="inv-client-name">${escapeHtml(client.name)}\x3C/div>
          ${client.company ? `<div>${escapeHtml(client.company)}\x3C/div>` : ''}

          <thead>

          <tbody>

              \x3C/tr>`).join('') : `
              <tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text-muted)">${L.noItems}\x3C/td>\x3C/tr>`}
          \x3C/tbody>

        <div class="inv-totals-block">

          ${deposit > 0 ? `<div class="inv-total-row"><span>${L.depositReceived}\x3C/span><span>−${formatCurrency(deposit)}\x3C/span>\x3C/div>` : ''}
          <div class="inv-total-row inv-balance-due"><span>${L.balanceDue}\x3C/span><span>${formatCurrency(balance)}\x3C/span>\x3C/div>
        \x3C/div>

        <div class="inv-footer-fields">
          <div class="form-group" style="margin-bottom:12px">
            <label class="inv-label">${L.paymentTerms}\x3C/label>
            <input class="form-input" id="inv-terms" value="${escapeHtml(L.defaultTerms)}" style="margin-top:4px">
          \x3C/div>
          <div class="form-group">
            <label class="inv-label">${L.notes}\x3C/label>
            <textarea class="form-input" id="inv-notes" rows="2" style="margin-top:4px;resize:vertical">\x3C/textarea>
          \x3C/div>
        \x3C/div>

        <div class="inv-thank-you">${L.thankYou}\x3C/div>
      \x3C/div>`;
  }

  function printInvoice() {
    if (!_data) return;
    const { invoiceNumber, invoiceDate, dueDate, client, events, biz } = _data;
    const L       = _labels();
    const lang    = I18n.getCurrentLang();
    const docName = _generateDocName(client, events, lang);
    const terms   = document.getElementById('inv-terms')?.value || L.defaultTerms;
    const notes   = document.getElementById('inv-notes')?.value || '';
    const subtotal = events.reduce((s, e) => s + (e.totalAmount || 0), 0);
    const deposit  = events.reduce((s, e) => s + (e.deposit    || 0), 0);
    const balance  = subtotal - deposit;

    const win = window.open('', '_blank', 'width=860,height=1050,scrollbars=yes');
    win.document.write(_buildPrintHTML({ invoiceNumber, invoiceDate, dueDate, client, biz, events, subtotal, deposit, balance, terms, notes, L, lang, docName }));
    win.document.close();
    win.focus();
    setTimeout(() => win.print(), 600);

  function _buildPrintHTML({ invoiceNumber, invoiceDate, dueDate, client, biz, events, subtotal, deposit, balance, terms, notes, L, lang, docName }) {
    const _esc = s => String(s || '').replace(/&/g,'&amp;').replace(/\x3C/g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const _fmt = n => `$${Number(n || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}`;
    const _fmtDate = d => {
      if (!d) return '—';
      const [y, m, day] = String(d).slice(0, 10).split('-');
      const locale = 'pt-BR';
      return new Date(+y, +m - 1, +day).toLocaleDateString(locale, { month: 'short', day: 'numeric', year: 'numeric' });

    const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#EC4899';

    <div class="t-row t-balance"><span>${_esc(L.balanceDue)}\x3C/span><span>${_fmt(balance)}\x3C/span>\x3C/div>

    <div class="thank-you">${_esc(L.thankYou)}\x3C/div>
  \x3C/div>
\x3C/body>
\x3C/html>`;
  }

  return { open, printInvoice };
})();
