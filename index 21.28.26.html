/* ============================================================
   BALLOON BUSINESS OS — App Entry Point
   ============================================================ */

let _currentSection = 'dashboard';

async function initApp() {
  try {
    await DB.open();
    await SeedData.maybeLoad();
    await SettingsModule.load();
    await I18n.load();
    I18n.applyStaticTranslations();

    const businessName = SettingsModule.get('businessName');
    const nameEl = document.querySelector('.brand-name');
    if (nameEl) nameEl.textContent = businessName;

    await loadAllData();
    navigateTo('dashboard');

    document.getElementById('loading-screen')?.remove();
    setupGlobalListeners();
  } catch (err) {
    console.error('App init error:', err);
    document.getElementById('loading-screen').innerHTML = `<div style="color:red;padding:2rem;">Error starting app: ${err.message}\x3C/div>`;
  }
}

async function loadAllData() {
  await Promise.all([
    ClientsModule.load(),
    EventsModule.load(),
    InventoryModule.load(),
    RentalsModule.load(),
    FinancesModule.load(),
    EmployeesModule.load(),
    MarketingModule.load(),
    SuppliersModule.load(),
    MileageModule.load(),
    RecipesModule.load()
  ]);
}

async function navigateTo(section) {
  _currentSection = section;

  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  const activeLink = document.querySelector(`[data-section="${section}"]`);
  if (activeLink) activeLink.classList.add('active');

  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  const sectionEl = document.getElementById(`section-${section}`);
  if (sectionEl) sectionEl.classList.add('active');

  switch (section) {
    case 'dashboard':
      await updateDashboardStats();
      await AnalyticsModule.renderDashboardCharts();
      break;
    case 'clients':
      ClientsModule.renderList();
      break;
    case 'events':
      EventsModule.renderList();
      renderEventFilters();
      break;
    case 'calendar':
      CalendarModule.render();
      break;
    case 'recipes':
      RecipesModule.renderList();
      break;
    case 'inventory':
      InventoryModule.renderList();
      break;
    case 'rentals':
      RentalsModule.renderItems();
      RentalsModule.renderRentals();
      break;
    case 'pricing':
      PricingModule.renderCalculator();
      break;
    case 'employees':
      EmployeesModule.renderList();
      EmployeesModule.renderTimesheets();
      break;
    case 'finances':
      FinancesModule.renderList();
      break;
    case 'marketing':
      MarketingModule.renderCampaigns();
      MarketingModule.renderContentCalendar();
      break;
    case 'suppliers':
      SuppliersModule.renderSuppliers();
      SuppliersModule.renderOrders();
      break;
    case 'mileage':
      MileageModule.renderList();
      break;
    case 'analytics':
      await AnalyticsModule.renderAnalyticsPage();
      break;
    case 'help':
      HelpModule.renderPage();
      break;
    case 'settings':
      SettingsModule.renderPage();
      break;
  }

  // Close mobile nav
  document.querySelector('.sidebar')?.classList.remove('open');
}

function renderEventFilters() {
  const filterBar = document.getElementById('event-status-filters');
  if (!filterBar) return;
  const statuses = ['all', ...APP_CONFIG.eventStatuses];
  filterBar.innerHTML = statuses.map(s => `
    <button class="filter-chip ${s==='all'?'active':''}" onclick="filterEvents('${s}', this)">${s === 'all' ? I18n.t('misc.all') : I18n.translateStatus(s)}\x3C/button>`).join('');
}

function filterEvents(status, btn) {
  document.querySelectorAll('#event-status-filters .filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  EventsModule.setFilter(status);
  EventsModule.renderList();
}

function setupGlobalListeners() {
  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeAllModals();
  });

  // Click outside modal to close
  document.addEventListener('click', (e) => {
    if (e.target.classList.contains('modal-overlay')) closeAllModals();
  });

  // Mobile menu toggle
  document.getElementById('menu-toggle')?.addEventListener('click', () => {
    document.querySelector('.sidebar')?.classList.toggle('open');
  });

  // Dark mode toggle shortcut
  document.getElementById('theme-toggle')?.addEventListener('click', async () => {
    const current = SettingsModule.get('theme');
    const next = current === 'dark' ? 'light' : 'dark';
    await SettingsModule.save({ theme: next });
    const btn = document.getElementById('theme-toggle');
    if (btn) btn.textContent = next === 'dark' ? '☀️' : '🌙';
  });

  // Global search
  const globalSearch = document.getElementById('global-search');
  if (globalSearch) {
    globalSearch.addEventListener('input', debounce((e) => {
      const q = e.target.value.trim();
      if (!q) return;
      performGlobalSearch(q);
    }, 300));
  }

  // Finance type filter (still a select)
  document.getElementById('finance-type-filter')?.addEventListener('change', (e) => {
    FinancesModule.setFilter(e.target.value, undefined);
    FinancesModule.renderList();
  });

  // Date range pickers — initialised after DOM is ready
  DateRangePicker.create('analytics-drp', {
    defaultPreset: 'last30',
    onChange: async (preset, start, end) => {
      if (preset === 'all' || (!start && !end)) {
        AnalyticsModule.setRange('all');
      } else {
        AnalyticsModule.setRange('custom', start, end);
      }
      if (_currentSection === 'analytics') await AnalyticsModule.renderAnalyticsPage();
    }
  });

  DateRangePicker.create('finance-drp', {
    defaultPreset: 'all',
    onChange: (preset, start, end) => {
      FinancesModule.setDateRange({ start: start || null, end: end || null });
      if (_currentSection === 'finances') FinancesModule.renderList();
    }
  });

  DateRangePicker.create('mileage-drp', {
    defaultPreset: 'all',
    onChange: (preset, start, end) => {
      MileageModule.setDateRange({ start: start || null, end: end || null });
      if (_currentSection === 'mileage') MileageModule.renderList();
    }
  });

  // Backup reminder dismiss
  document.getElementById('backup-snooze')?.addEventListener('click', () => {
    localStorage.setItem('backup_snoozed_until', Date.now() + 86400000);
    document.getElementById('backup-reminder')?.classList.add('hidden');
    showToast('Lembrete de backup pausado por 24 horas.', 'success');
  });

  document.getElementById('backup-dismiss')?.addEventListener('click', () => {
    document.getElementById('backup-reminder')?.classList.add('hidden');
  });

  document.getElementById('backup-export-now')?.addEventListener('click', exportFullBackup);

  // Theme on load
  const theme = SettingsModule.get('theme');
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
}

async function performGlobalSearch(q) {
  const ql = q.toLowerCase();
  const [clients, events] = await Promise.all([DB.getAll('clients'), DB.getAll('events')]);
  const clientMatches = clients.filter(c => (c.name||'').toLowerCase().includes(ql));
  const eventMatches = events.filter(e => (e.name||'').toLowerCase().includes(ql));

  const resultsEl = document.getElementById('search-results');
  if (!resultsEl) return;

  if (!clientMatches.length && !eventMatches.length) {
    resultsEl.innerHTML = `<div class="search-no-results">${I18n.t('misc.no_results', { term: escapeHtml(q) })}\x3C/div>`;
    resultsEl.classList.remove('hidden');
    return;
  }

  resultsEl.innerHTML = `
    ${clientMatches.length ? `<div class="search-section"><div class="search-section-label">${I18n.t('misc.section_clients')}\x3C/div>${clientMatches.slice(0,5).map(c=>`<div class="search-result-item" onclick="navigateTo('clients'); ClientsModule.openProfile('${c.id}'); document.getElementById('search-results').classList.add('hidden');">👥 ${escapeHtml(c.name)}\x3C/div>`).join('')}\x3C/div>` : ''}
    ${eventMatches.length ? `<div class="search-section"><div class="search-section-label">${I18n.t('misc.section_events')}\x3C/div>${eventMatches.slice(0,5).map(e=>`<div class="search-result-item" onclick="navigateTo('events'); EventsModule.openForm('${e.id}'); document.getElementById('search-results').classList.add('hidden');">📅 ${escapeHtml(e.name)} — ${formatDate(e.date)}\x3C/div>`).join('')}\x3C/div>` : ''}`;
  resultsEl.classList.remove('hidden');

  document.addEventListener('click', function hideResults(evt) {
    if (!resultsEl.contains(evt.target) && evt.target !== document.getElementById('global-search')) {
      resultsEl.classList.add('hidden');
      document.removeEventListener('click', hideResults);
    }
  });
}

// Expose navigation globally
window.navigateTo = navigateTo;
window.filterEvents = filterEvents;

document.addEventListener('DOMContentLoaded', initApp);

</script>
</body>
</html>
